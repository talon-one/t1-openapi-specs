                  loyalty:
                    description: The loyalty program status of the customer.
                    type: object
                    required:
                      - programs
                    properties:
                      cards:
                        title: Point balances of the loyalty cards used.
                        description: >-
                          Displays information about the balances of the loyalty
                          cards.
                        type: array
                        items:
                          allOf:
                            - type: object
                              required:
                                - id
                                - created
                              properties:
                                id:
                                  type: integer
                                  description: The internal ID of this entity.
                                  example: 6
                                created:
                                  type: string
                                  format: date-time
                                  description: The time this entity was created.
                                  example: '2020-06-10T09:05:27.993483Z'
                            - type: object
                              required:
                                - programID
                              properties:
                                programID:
                                  type: integer
                                  description: >-
                                    The ID of the loyalty program that owns this
                                    entity.
                                  example: 125
                                programName:
                                  type: string
                                  description: >-
                                    The integration name of the loyalty program
                                    that owns this entity.
                                  example: Loyalty_program
                                programTitle:
                                  type: string
                                  description: >-
                                    The Campaign Manager-displayed name of the
                                    loyalty program that owns this entity.
                                  example: Loyalty program
                            - type: object
                              required:
                                - status
                              properties:
                                status:
                                  type: string
                                  description: >
                                    Status of the loyalty card. Can be `active`
                                    or `inactive`.
                                  example: active
                                blockReason:
                                  type: string
                                  description: >
                                    Reason for transferring and blocking the
                                    loyalty card.
                                  example: >-
                                    Current card lost. Customer needs a new
                                    card.
