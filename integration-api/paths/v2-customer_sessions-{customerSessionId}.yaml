                                    `5D`, `7W`, `10M`, `15Y`.


                                    Available units:


                                    - `s`: seconds

                                    - `m`: minutes

                                    - `h`: hours

                                    - `D`: days

                                    - `W`: weeks

                                    - `M`: months

                                    - `Y`: years


                                    You can round certain units up or down:

                                    - `_D` for rounding down days only.
                                    Signifies the start of the day.

                                    - `_U` for rounding up days, weeks, months
