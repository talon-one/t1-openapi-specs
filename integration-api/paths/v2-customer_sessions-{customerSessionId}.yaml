# path: /v2/customer_sessions/{customerSessionId}
put:
  operationId: updateCustomerSessionV2
  summary: Update customer session
  description: >
    Update or create a [customer

    session](https://docs.talon.one/docs/dev/concepts/entities/customer-sessions).


    The endpoint responds with the potential promotion rule

    [effects](https://docs.talon.one/docs/dev/integration-api/api-effects) that

    match the current cart.


    For example, use this endpoint to share the contents of a customer's cart

    with Talon.One.


    > [!note] **Note**

    > - The currency for the session and the cart items in it is the currency
    set for the Application linked to this session.

    > - [Archived
    campaigns](https://docs.talon.one/docs/product/campaigns/managing-campaigns#archiving-a-campaign)
    are not considered for rule evaluation.


    ### Session management


    To use this endpoint, start by learning about [customer

    sessions](https://docs.talon.one/docs/dev/concepts/entities/customer-sessions)

    and their states and refer to the `state` parameter documentation the

    request body schema docs below.


    ### Sessions and customer profiles


    - To link a session to a customer profile, set the `profileId` parameter in

    the request body to a customer profile's `integrationId`.


    - While you can create an anonymous session with `profileId=""`, we

    recommend you use a guest ID instead.


    - A profile can be linked to simultaneous sessions in different

    Applications. Either:
      - Use unique session integration IDs or,
      - Use the same session integration ID across all of the Applications.

    > [!note] **Note**

    > - If the specified profile does not exist, an empty profile is **created
    automatically**.

    >   You can update it with [Update customer
    profile](https://docs.talon.one/integration-api#tag/Customer-profiles/operation/updateCustomerProfileV2).

    > - Updating a customer session returns a response with the new integration
    state. Use the `responseContent` property to save yourself extra API calls.

    >   For example, you can get the customer profile details directly without
    extra requests.

    > - We recommend sending requests sequentially. See [Managing parallel
    requests](https://docs.talon.one/docs/dev/getting-started/integration-tutorial#managing-parallel-requests).


    For more information, see:


    - The introductory video in [Getting
    started](https://docs.talon.one/docs/dev/getting-started/overview).

    - The [integration
    tutorial](https://docs.talon.one/docs/dev/tutorials/integrating-talon-one).
  security:
    - api_key_v1: []
  tags:
    - Customer sessions
  parameters:
    - name: dry
      in: query
      description: >
        Indicates whether to persist the changes. Changes are ignored when
        `dry=true`.


        When set to `true`:

        - The endpoint considers **only** the payload that you pass when
        **closing** the session.
          When you do not use the `dry` parameter, the endpoint behaves as a typical PUT endpoint. Each update builds upon the previous ones.
        - You can use the `evaluableCampaignIds` body property to select
        specific campaigns to run.


        [See the
        docs](https://docs.talon.one/docs/dev/integration-api/dry-requests).
      example: false
      required: false
      schema:
        type: boolean
    - name: customerSessionId
      in: path
      required: true
      description: >
        The `integration ID` of the customer session. You set this ID when you
        create a customer session.


        You can see existing customer session integration IDs in the Campaign
        Manager's **Sessions** menu, or via the

        [List Application
        session](https://docs.talon.one/management-api#tag/Customer-data/operation/getApplicationSessions)
        endpoint.
      example: session1
      schema:
        type: string
    - name: now
      in: query
      required: false
      description: >
        A timestamp value of a future date that acts as a current date when

        included in the query.


        Use this parameter, for example, to test campaigns that would be

        evaluated for this customer session in the future (say, [scheduled

        campaigns](https://docs.talon.one/docs/product/campaigns/settings/managing-campaign-schedule)).


        > [!note] **Note**

        > - It must be an RFC3339 timestamp string.

        > - It can **only** be a date in the future.

        > - It can **only** be used if the `dry` parameter in the query is set
        to `true`.
      example: '2024-05-29T15:04:05+07:00'
      schema:
        type: string
        format: date-time
  requestBody:
    content:
      application/json:
        schema:
          type: object
          description: >-
            The body of a V2 integration API request (customer session update).
            Next to the customer session details, this contains an optional
            listing of extra properties that should be returned in the response.
          required:
            - customerSession
          properties:
            customerSession:
              description: The customer session update details.
              allOf:
                - type: object
                  properties:
                    profileId:
                      type: string
                      description: >
                        ID of the customer profile set by your integration
                        layer.


                        **Note:** If the customer does not yet have a known
                        `profileId`, we recommend you use a guest `profileId`.
                      example: URNGV8294NV
                - type: object
                  properties:
                    storeIntegrationId:
                      type: string
                      minLength: 1
                      maxLength: 1000
                      description: >-
                        The integration ID of the store. You choose this ID when
                        you create a store.
                      example: STORE-001
                - type: object
                  properties:
                    evaluableCampaignIds:
                      type: array
                      items:
                        type: integer
                      description: >
                        When using the `dry` query parameter, use this property
                        to list the campaign to be evaluated by the Rule Engine.


                        These campaigns will be evaluated, even if they are
                        disabled, allowing you to test specific campaigns before
                        activating them.
                      title: Campaigns to evaluate
                      example:
                        - 10
                        - 12
                - type: object
                  properties:
                    couponCodes:
                      type: array
                      items:
                        type: string
                        maxLength: 100
                      description: >
                        Any coupon codes entered.


                        **Important - for requests only**:


                        - If you [create a coupon
                        budget](https://docs.talon.one/docs/product/campaigns/settings/managing-campaign-budgets/#budget-types)
                        for your campaign, ensure the session contains a coupon
                        code by the time you close it.

                        - In requests where `dry=false`, providing an empty
                        array discards any previous coupons. To avoid this, omit
                        the parameter entirely.
                      title: Coupons entered in session
                      example:
                        - XMAS-20-2021
                    referralCode:
                      type: string
                      description: >
                        Any referral code entered.


                        **Important - for requests only**:


                        - If you [create a referral
                        budget](https://docs.talon.one/docs/product/campaigns/settings/managing-campaign-budgets/#budget-types)
                        for your campaign, ensure the session contains a
                        referral code by the time you close it.

                        - In requests where `dry=false`, providing an empty
                        value discards the previous referral code. To avoid
                        this, omit the parameter entirely.
                      title: Referral code entered in session
                      maxLength: 100
                      example: NT2K54D9
                    loyaltyCards:
                      type: array
                      maxItems: 1
                      items:
                        type: string
                      description: Identifier of a loyalty card.
                      example:
                        - loyalty-card-1
                    state:
                      type: string
                      enum:
                        - open
                        - closed
                        - partially_returned
                        - cancelled
                      default: open
                      example: open
                      description: >
                        Indicates the current state of the session. Sessions can
                        be created as `open` or `closed`. The state transitions
                        are:


                        1. `open` → `closed`

                        2. `open` → `cancelled`

                        3. Either:
                           - `closed` → `cancelled` (**only** via [Update customer session](https://docs.talon.one/integration-api#tag/Customer-sessions/operation/updateCustomerSessionV2)) or
                           - `closed` → `partially_returned` (**only** via [Return cart items](https://docs.talon.one/integration-api#tag/Customer-sessions/operation/returnCartItems))
                           - `closed` → `open` (**only** via [Reopen customer session](https://docs.talon.one/integration-api#tag/Customer-sessions/operation/reopenCustomerSession))
                        4. `partially_returned` → `cancelled`


                        For more information, see [Customer session
                        states](https://docs.talon.one/docs/dev/concepts/entities/customer-sessions).
                      title: Customer's session state
                    cartItems:
                      type: array
                      description: >
                        The items to add to this session. **Do not exceed 1000
                        items** and ensure the sum of all cart item's `quantity`
                        **does not exceed 10.000** per request.
                      title: Customer session's cart items
                      items:
                        type: object
                        required:
                          - sku
                          - quantity
                        properties:
                          name:
                            title: Name of item
                            type: string
                            description: Name of item.
                            example: Air Glide
                          sku:
                            title: SKU of item
                            type: string
                            description: Stock keeping unit of item.
                            minLength: 1
                            example: SKU1241028
                          quantity:
                            title: Quantity of item
                            type: integer
                            description: >
                              Number of units of this item. Due to [cart item
                              flattening](https://docs.talon.one/docs/product/rules/understanding-cart-item-flattening),

                              if you provide a quantity greater than 1, the item
                              will be split in as many items as the provided
                              quantity.

                              This will impact the number of **per-item**
                              effects triggered from your campaigns.
                            minimum: 1
                            example: 1
                          returnedQuantity:
                            title: Returned quantity of item
                            type: integer
                            readOnly: true
                            description: >-
                              Number of returned items, calculated internally
                              based on returns of this item.
                            example: 1
                          remainingQuantity:
                            title: Remaining quantity of item
                            type: integer
                            readOnly: true
                            description: >-
                              Remaining quantity of the item, calculated
                              internally based on returns of this item.
                            example: 1
                          price:
                            title: Price of item
                            type: number
                            description: >
                              Price of the item in the currency defined by your
                              Application. This field is required if this item
                              is not part of a
                              [catalog](https://docs.talon.one/docs/product/account/dev-tools/managing-cart-item-catalogs).
                              If it is part of a catalog, setting a price here
                              overrides the price from the catalog.
                            example: 99.99
                          category:
                            title: Item category
                            type: string
                            description: Type, group or model of the item.
                            example: shoes
                          product:
                            title: Item product
                            type: object
                            description: >-
                              The specific properties of the product this item
                              belongs to, if available.
                            required:
                              - name
                            properties:
                              name:
                                type: string
                                description: The product the item belongs to.
                                example: sample_product
                          weight:
                            title: Weight of item
                            type: number
                            description: Weight of item in grams.
                            example: 1130
                          height:
                            title: Height of item
                            type: number
                            description: Height of item in mm.
                          width:
                            title: Width of item
                            type: number
                            description: Width of item in mm.
                          length:
                            title: Length of item
                            type: number
                            description: Length of item in mm.
                          position:
                            title: Position of Cart Item
                            type: number
                            readOnly: true
                            description: >-
                              Position of the Cart Item in the Cart (calculated
                              internally).
                          attributes:
                            title: Item attributes
                            type: object
                            description: >
                              Use this property to set a value for the
                              attributes of your choice.
                              [Attributes](https://docs.talon.one/docs/dev/concepts/attributes)
                              represent any information to attach to this cart
                              item.


                              Custom _cart item_ attributes must be created in
                              the Campaign Manager before you set them with this
                              property.


                              **Note:** Any previously defined attributes that
                              you do not include in the array will be removed.
                            example:
                              image: 11.jpeg
                              material: leather
                          additionalCosts:
                            type: object
                            description: >
                              Use this property to set a value for the
                              additional costs of this item, such as a shipping
                              cost. They must be created in the Campaign Manager

                              before you set them with this property. See
                              [Managing additional
                              costs](https://docs.talon.one/docs/product/account/dev-tools/managing-additional-costs).
                            additionalProperties:
                              type: object
                              required:
                                - price
                              properties:
                                price:
                                  title: Price of additional cost
                                  type: number
                                  example: 4.5
                            example:
                              shipping:
                                price: 9
                          catalogItemID:
                            title: The catalog item ID
                            type: integer
                            readOnly: true
                            description: The catalog item ID.
                          selectedPriceType:
                            title: Price Type
                            type: string
                            readOnly: true
                            description: >-
                              The selected price type for this cart item (e.g.
                              the price for members only).
                            example: member
                          adjustmentReferenceId:
                            title: Price Adjustment ID
                            type: string
                            format: uuid
                            readOnly: true
                            description: >-
                              The reference ID of the selected price adjustment
                              for this cart item. Only returned if the selected
                              price resulted from a price adjustment.
                            example: 68851723-e6fa-488f-ace9-112581e6c19b
                          adjustmentEffectiveFrom:
                            title: Price Adjustment Start Date
                            type: string
                            format: date-time
                            readOnly: true
                            description: >-
                              The date and time from which the price adjustment
                              is effective. Only returned if the selected price
                              resulted from a price adjustment that contains
                              this field.
                            example: '2021-09-12T10:12:42Z'
                          adjustmentEffectiveUntil:
                            title: Price Adjustment Expiry Date
                            type: string
                            format: date-time
                            readOnly: true
                            description: >-
                              The date and time until which the price adjustment
                              is effective. Only returned if the selected price
                              resulted from a price adjustment that contains
                              this field.
                            example: '2021-09-12T10:12:42Z'
                          prices:
                            readOnly: true
                            type: object
                            description: >
                              A map of keys and values representing the price
                              types and related price adjustment details for
                              this cart item.

                              The keys correspond to the `priceType` names.
                            additionalProperties:
                              type: object
                              properties:
                                price:
                                  type: number
                                  format: float
                                  description: The value of this price type.
                                  example: 90
                                adjustmentContextId:
                                  type: string
                                  description: >-
                                    The context identifier of the selected price
                                    adjustment.
                                  example: summer25
                                adjustmentReferenceId:
                                  type: string
                                  format: uuid
                                  description: >-
                                    The reference identifier of the selected
                                    price adjustment for this SKU.
                                  example: 68851723-e6fa-488f-ace9-112581e6c19b
                                adjustmentEffectiveFrom:
                                  type: string
                                  format: date-time
                                  description: >-
                                    The date and time from which the price
                                    adjustment is effective.
                                  example: '2025-05-25T00:00:00Z'
                                adjustmentEffectiveUntil:
                                  type: string
                                  format: date-time
                                  description: >-
                                    The date and time until which the price
                                    adjustment is effective.
                                  example: '2025-05-30T00:00:00Z'
                            example:
                              member:
                                price: 90
                                adjustmentReferenceId: 68851723-e6fa-488f-ace9-112581e6c19b
                                effectiveFrom: '2025-05-25T00:00:00Z'
                                effectiveUntil: '2025-05-30T00:00:00Z'
                              base:
                                price: 100
                    experimentVariantAllocations:
                      type: array
                      description: >
                        The experiment variant allocations to add to this
                        session.
                      title: Experiment variant allocations
                      items:
                        type: object
                        required:
                          - experimentID
                          - variantID
                        properties:
                          experimentID:
                            description: The ID of the experiment.
                            type: integer
                            example: 1
                          variantID:
                            description: The ID of the variant to be allocated.
                            type: integer
                            example: 2
                    additionalCosts:
                      type: object
                      description: >
                        Use this property to set a value for the additional
                        costs of this session, such as a shipping cost.


                        They must be created in the Campaign Manager

                        before you set them with this property. See [Managing
                        additional
                        costs](https://docs.talon.one/docs/product/account/dev-tools/managing-additional-costs).
                      additionalProperties:
                        type: object
                        required:
                          - price
                        properties:
                          price:
                            title: Price of additional cost
                            type: number
                            example: 4.5
                      example:
                        shipping:
                          price: 9
                    identifiers:
                      type: array
                      maxItems: 5
                      items:
                        type: string
                      title: Session identifiers
                      description: >
                        Session custom identifiers that you can set limits on or
                        use inside your rules.


                        For example, you can use IP addresses as identifiers to
                        potentially identify devices

                        and limit discounts abuse in case of customers creating
                        multiple accounts.

                        See the
                        [tutorial](https://docs.talon.one/docs/dev/tutorials/using-identifiers).


                        **Important**: Ensure the session contains an identifier
                        by the time you close it if:

                        - You [create a unique identifier
                        budget](https://docs.talon.one/docs/product/campaigns/settings/managing-campaign-budgets/#budget-types)

                        for your campaign.

                        - Your campaign has
                        [coupons](https://docs.talon.one/docs/product/campaigns/coupons/coupon-page-overview).

                        - We recommend passing an anonymized (hashed) version of
                        the identifier value.
                      example:
                        - >-
                          d41306257915f83fe01e54092ae470f631161ea16fcf4415842eed41470386ea
                    attributes:
                      type: object
                      additionalProperties: true
                      description: >
                        Use this property to set a value for the attributes of
                        your choice. Attributes represent any information to
                        attach to your session, like the shipping city.


                        You can use [built-in
                        attributes](https://docs.talon.one/docs/dev/concepts/attributes#built-in-attributes)
                        or [custom
                        ones](https://docs.talon.one/docs/dev/concepts/attributes#custom-attributes).

                        Custom attributes must be created in the Campaign
                        Manager before you set them with this property.
                      example:
                        ShippingCity: Berlin
            responseContent:
              type: array
              description: >
                Extends the response with the chosen data entities. Use this
                property to get as much data

                as you need in one _Update customer session_ request instead of
                sending extra requests to other endpoints.


                **Note:** To retrieve loyalty card details, your request must
                include a loyalty card ID.
              example:
                - customerSession
                - customerProfile
              items:
                type: string
                enum:
                  - customerSession
                  - customerProfile
                  - coupons
                  - triggeredCampaigns
                  - referral
                  - loyalty
                  - event
                  - awardedGiveaways
                  - ruleFailureReasons
                  - previousReturns
                  - campaignEligibility
        examples:
          Full request:
            summary: Full request
            x-vertical: none
            value:
              customerSession:
                profileId: URNGV8294NV
                storeIntegrationId: STORE-001
                evaluableCampaignIds:
                  - 10
                  - 12
                couponCodes:
                  - XMAS-20-2021
                referralCode: NT2K54D9
                loyaltyCards:
                  - loyalty-card-1
                state: open
                cartItems:
                  - name: Air Glide
                    sku: SKU1241028
                    quantity: 1
                    price: 99.99
                    category: shoes
                    product:
                      name: sample_product
                    weight: 1130
                    height: 0
                    width: 0
                    length: 0
                    attributes:
                      image: 11.jpeg
                      material: leather
                    additionalCosts:
                      shipping:
                        price: 9
                experimentVariantAllocations:
                  - experimentID: 1
                    variantID: 2
                additionalCosts:
                  shipping:
                    price: 9
                identifiers:
                  - >-
                    d41306257915f83fe01e54092ae470f631161ea16fcf4415842eed41470386ea
                attributes:
                  ShippingCity: Berlin
              responseContent:
                - customerSession
                - customerProfile
          eCommerce:
            x-vertical: ecommerce
            summary: 'Example: eCommerce'
            description: |
              Update a customer session with multiple cart items and attributes,
              including SKUs, prices, and more.
            value:
              customerSession:
                profileId: 382370BKDB946
                cartItems:
                  - name: Wireless Bluetooth Headphones
                    sku: AUDIO-WH350
                    quantity: 1
                    price: 79.99
                    weight: 310
                  - name: USB-C Charging Cable
                    sku: CABLE-USBC-2M
                    quantity: 2
                    price: 15.99
                    weight: 40
              responseContent:
                - customerSession
                - customerProfile
          QSR & dining:
            x-vertical: qsr
            summary: 'Example: QSR & dining'
            description: >
              Update a customer session as a customer builds a combo meal,
              including

              quantities, categories, and more.
            value:
              customerSession:
                profileId: 382370BKDB946
                cartItems:
                  - name: Cheeseburger
                    sku: BURGER-001
                    quantity: 1
                    price: 8.99
                    category: Main
                  - name: French Fries
                    sku: SIDE-002
                    quantity: 1
                    price: 3.49
                    category: Side
                  - name: Cola
                    sku: DRINK-003
                    quantity: 1
                    price: 2.49
                    category: Beverage
              responseContent:
                - customerSession
                - customerProfile
                - loyalty
          Financial services:
            x-vertical: finance
            summary: 'Example: Financial services'
            description: |
              Update a customer session when a cardholder completes a purchase.
            value:
              customerSession:
                profileId: customer-789
                cartItems:
                  - name: Card Purchase - Electronics Store
                    sku: TXN-CC-001
                    quantity: 1
                    price: 250
                attributes:
                  CardType: credit
                  MerchantCategory: electronics
                  TransactionType: card_payment
              responseContent:
                - customerSession
                - customerProfile
                - loyalty
          Travel & hospitality:
            x-vertical: travel
            summary: 'Example: Travel & hospitality'
            description: |
              Update a customer session when a guest books a hotel stay to
              automatically award bonus loyalty points for stays that exceed
              the minimum night count.
            value:
              customerSession:
                profileId: customer-321
                cartItems:
                  - name: Deluxe Room - 5 nights
                    sku: HOTEL-ROOM-DLX
                    quantity: 5
                    price: 189
                attributes:
                  CheckInDate: '2026-06-10'
                  CheckOutDate: '2026-06-15'
                  StayNights: 5
                  PropertyType: hotel
              responseContent:
                - customerSession
                - customerProfile
                - loyalty
    description: body
    required: true
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            allOf:
              - type: object
                description: >
                  Contains entities that might be valuable in Talon.One
                  integrations.
                required:
                  - effects
                  - createdCoupons
                  - createdReferrals
                properties:
                  customerProfile:
                    description: The customer profile associated with the event.
                    allOf:
                      - type: object
                        required:
                          - id
                          - created
                        properties:
                          id:
                            type: integer
                            description: The internal ID of the customer profile.
                            example: 6
                          created:
                            type: string
                            format: date-time
                            description: The time the customer profile was created.
                            example: '2020-06-10T09:05:27.993483Z'
                      - type: object
                        required:
                          - integrationId
                          - created
                        properties:
                          integrationId:
                            type: string
                            format: string
                            example: URNGV8294NV
                            maxLength: 1000
                            description: The integration ID set by your integration layer.
                          created:
                            type: string
                            format: date-time
                            description: The time this entity was created.
                            example: '2020-02-07T08:15:22Z'
                      - type: object
                        properties:
                          attributes:
                            type: object
                            additionalProperties: true
                            description: Arbitrary properties associated with this item.
                            example:
                              Language: english
                              ShippingCountry: DE
                      - type: object
                        properties:
                          accountId:
                            type: integer
                            title: Profile belongs to Account
                            description: >-
                              The ID of the Talon.One account that owns this
                              profile.
                            example: 31
                          closedSessions:
                            type: integer
                            title: Closed sessions
                            description: >-
                              The total number of closed sessions. Does not
                              include closed sessions that have been cancelled
                              or reopened. See the
                              [docs](https://docs.talon.one/docs/dev/concepts/entities/customer-sessions#customer-session-states).
                            example: 3
                          totalSales:
                            type: number
                            description: >
                              The total amount of money spent by the customer
                              **before** discounts are applied.


                              The total sales amount excludes the following:

                              - Cancelled or reopened sessions.

                              - Returned items.
                            example: 299.99
                            title: Total Sales
                          loyaltyMemberships:
                            type: array
                            description: >
                              **DEPRECATED. Always returns `null`.** A list of
                              loyalty programs joined by the customer.
                            items:
                              type: object
                              required:
                                - loyaltyProgramId
                              properties:
                                joined:
                                  type: string
                                  format: date-time
                                  title: Loyalty program joined at
                                  description: >-
                                    The moment in which the loyalty program was
                                    joined.
                                  example: '2012-03-20T14:15:22Z'
                                loyaltyProgramId:
                                  type: integer
                                  title: Loyalty program ID
                                  description: >-
                                    The ID of the loyalty program belonging to
                                    this entity.
                                  example: 323414846
                            title: Loyalty programed joined
                            example: null
                          audienceMemberships:
                            type: array
                            description: The audiences the customer belongs to.
                            items:
                              type: object
                              required:
                                - id
                                - name
                              properties:
