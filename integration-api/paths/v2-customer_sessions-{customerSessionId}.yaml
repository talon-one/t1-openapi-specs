                                        if you provide a quantity greater than
                                        1, the item will be split in as many
                                        items as the provided quantity.

                                        This will impact the number of
                                        **per-item** effects triggered from your
                                        campaigns.
                                      minimum: 1
                                      example: 1
                                    returnedQuantity:
