get:
  operationId: getCustomerSession
  summary: Get customer session
  description: >
    Get the details of the given customer session.


    You can get the same data via other endpoints that also apply changes, which
    can help you save requests and increase performance. See:


    - [Update customer
    session](#tag/Customer-sessions/operation/updateCustomerSessionV2)

    - [Update customer
    profile](#tag/Customer-profiles/operation/updateCustomerProfileV2)
  security:
    - api_key_v1: []
  tags:
    - Customer sessions
  parameters:
    - name: customerSessionId
      in: path
      required: true
      description: >
        The `integration ID` of the customer session. You set this ID when you
        create a customer session.


        You can see existing customer session integration IDs in the Campaign
        Manager's **Sessions** menu, or via the

        [List Application
        session](https://docs.talon.one/management-api#tag/Customer-data/operation/getApplicationSessions)
        endpoint.
      example: session1
      schema:
        type: string
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              customerSession:
                allOf:
                  - type: object
                    required:
                      - id
                      - created
                    properties:
                      id:
                        type: integer
                        description: The internal ID of this entity.
                        example: 6
                      created:
                        type: string
                        format: date-time
                        description: The time this entity was created.
                        example: '2020-06-10T09:05:27.993483Z'
                  - type: object
                    required:
                      - integrationId
                      - created
                    properties:
                      integrationId:
                        type: string
                        format: string
                        example: URNGV8294NV
                        maxLength: 1000
                        description: The integration ID set by your integration layer.
                      created:
                        type: string
                        format: date-time
                        description: The time this entity was created.
                        example: '2020-02-07T08:15:22Z'
                  - type: object
                    required:
                      - applicationId
                    properties:
                      applicationId:
                        type: integer
                        description: The ID of the Application that owns this entity.
                        example: 322
                  - description: The representation of the customer session.
                    allOf:
                      - type: object
                        properties:
                          profileId:
                            type: string
                            description: >
                              ID of the customer profile set by your integration
                              layer.


                              **Note:** If the customer does not yet have a
                              known `profileId`, we recommend you use a guest
