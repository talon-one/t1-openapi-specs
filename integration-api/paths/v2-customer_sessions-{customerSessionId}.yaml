                            - effectType
                          properties:
                            experimentId:
                              type: integer
                              description: >-
                                The ID of the experiment that campaign belongs
                                to.
                              example: 12
                            campaignId:
                              type: integer
                              description: >-
                                The ID of the campaign that triggered this
                                effect.
                              example: 244
                            rulesetId:
                              type: integer
                              description: >-
                                The ID of the ruleset that was active in the
                                campaign when this effect was triggered.
                              example: 73
                            ruleIndex:
                              type: integer
                              description: >-
                                The position of the rule that triggered this
                                effect within the ruleset.
                              example: 2
                            ruleName:
                              type: string
                              description: The name of the rule that triggered this effect.
                              example: Give 20% discount
                            effectType:
                              type: string
                              description: >-
                                The type of effect that was triggered. See [API
                                effects](https://docs.talon.one/docs/dev/integration-api/api-effects).
                              example: rejectCoupon
                            triggeredByCoupon:
                              type: integer
                              example: 4928
                              description: >-
                                The ID of the coupon that was being evaluated
                                when this effect was triggered.
                            triggeredForCatalogItem:
                              type: integer
                              example: 786
                              description: >-
                                The ID of the catalog item that was being
                                evaluated when this effect was triggered.
                            conditionIndex:
                              type: integer
                              example: 786
                              description: The index of the condition that was triggered.
                            evaluationGroupID:
                              type: integer
                              example: 3
                              description: >-
                                The ID of the evaluation group. For more
                                information, see [Managing campaign
                                evaluation](https://docs.talon.one/docs/product/applications/managing-campaign-evaluation).
                            evaluationGroupMode:
                              type: string
                              example: stackable
                              description: >-
                                The evaluation mode of the evaluation group. For
                                more information, see [Managing campaign
                                evaluation](https://docs.talon.one/docs/product/applications/managing-campaign-evaluation).
                            campaignRevisionId:
                              type: integer
                              example: 1
                              description: >-
                                The revision ID of the campaign that was used
                                when triggering the effect.
                            campaignRevisionVersionId:
                              type: integer
                              example: 5
                              description: >-
                                The revision version ID of the campaign that was
                                used when triggering the effect.
                            selectedPriceType:
                              type: string
                              example: member
                              description: >-
                                The selected price type for the SKU targeted by
                                this effect.
                            selectedPrice:
                              type: number
                              example: 100
                              description: >-
                                The value of the selected price type to apply to
                                the SKU targeted by this effect, before any
                                discounts are applied.
                            adjustmentReferenceId:
                              type: string
                              format: uuid
                              example: 68851723-e6fa-488f-ace9-112581e6c19b
                              description: >-
                                The reference identifier of the selected price
                                adjustment for this SKU. This is only returned
                                if the `selectedPrice` resulted from a price
                                adjustment.
                        - type: object
                          description: >-
                            A generic effect that is fired by a triggered
                            campaign. The props property will contain
                            information specific to the specific effect type.
                          required:
                            - props
                          properties:
                            props:
                              oneOf:
                                - type: object
                                  title: acceptCoupon
                                  description: >-
                                    This effect indicates that the coupon code
                                    supplied was valid.


                                    You should handle this effect by clearing
                                    any messages from previous `rejectCoupon`
                                    effects and informing the user that the
                                    coupon is valid.


                                    The code is automatically redeemed when you
                                    close the session.


                                    Other effects, such as
                                    [setDiscount](https://docs.talon.one/docs/dev/integration-api/api-effects#setdiscount),
                                    provide more information about the actual
                                    rewards received.
                                  example:
                                    value: COUP-XYZ789
                                  required:
                                    - value
                                  properties:
                                    value:
                                      type: string
                                      description: The coupon code that was accepted.
                                - type: object
                                  title: acceptReferral
                                  description: >-
                                    This effect indicates that the referral code
                                    supplied is valid.


                                    You should handle this effect by informing
                                    the user that the referral code is valid.


                                    The code is automatically redeemed when you
                                    close the session.


                                    Other effects will provide more information
                                    about the actual reward.
                                  example:
                                    value: REF-ABC123
                                  required:
                                    - value
                                  properties:
                                    value:
                                      type: string
                                      description: >-
                                        The referral code provided in the
                                        session.
                                - type: object
                                  title: redeemReferral
                                  description: >
                                    This effect is **deprecated**. It has been
                                    replaced by the `acceptReferral` effect.

                                    This effect indicates that the referral code
                                    is valid and has been redeemed.
                                  example:
                                    id: 12
                                    value: REF-ABC123
                                  required:
                                    - id
                                    - value
                                  properties:
                                    id:
                                      type: integer
                                      description: >-
                                        The id of the referral code that was
                                        redeemed.
                                    value:
                                      type: string
                                      description: The referral code that was redeemed.
                                - type: object
                                  title: rejectCoupon
                                  description: >-
                                    This effect indicates that the coupon code
                                    supplied couldn't be used.


                                    You should handle this effect by informing
                                    their user the coupon code is invalid.
                                  example:
                                    value: COUP-XYZ789
                                    rejectionReason: CouponRejectedCondition
                                    conditionIndex: 2
                                    effectIndex: 0
                                    details: Coupon usage limit reached
                                    campaignExclusionReason: CampaignGaveLowerDiscount
                                  required:
                                    - value
                                    - rejectionReason
                                  properties:
                                    value:
                                      type: string
                                      description: The coupon code that was rejected.
                                    rejectionReason:
                                      type: string
                                      description: >-
                                        The reason why the code was rejected.


                                        - `CampaignLimitReached`: The
                                        campaign-wide coupon code redemption
                                        limit has been reached.

                                        - `CouponExpired`: The coupon is
                                        expired.

                                        - `CouponLimitReached`: The coupon
                                        redemption limit or a campaign budget
                                        was reached.

                                        - `CouponNotFound`: The coupon code is
                                        incorrect.

                                        - `CouponPartOfNotRunningCampaign`: The
                                        campaign the coupon belongs to is
                                        currently not active. The campaignId
                                        field contains the ID of that campaign.

                                        - `CouponRecipientDoesNotMatch`: The
                                        given coupon value does not match the
                                        recipient or the coupon is linked to a
                                        `recipientIntegrationID` but there is no
                                        profile in the session.

                                        - `CouponRejectedByCondition`: Other
                                        conditions failed in the rule or all
                                        conditions passed but the `Coupon code
                                        is valid` condition is not present.

                                        - `CouponStartDateInFuture`: The coupon
                                        isn't active yet.

                                        - `EffectCouldNotBeApplied`: One of the
                                        effects in the campaign wasn't applied
                                        because a limit for that effect was
                                        reached (most common use case will be
                                        `setDiscount` cannot be applied because
                                        a discount limit is reached).

                                        - `ProfileLimitReached`: The
                                        profile-specific coupon redemption limit
                                        has been reached.

                                        - `CouponPartOfNotTriggeredCampaign`:
                                        The campaign the coupon belongs to was
                                        not triggered during evaluation (an
                                        exclusive or stackable campaign). The
                                        `campaignId` field contains the ID of
                                        that campaign.

                                        - `CouponReservationRequired`: The
                                        coupon's `isReservationMandatory`
                                        property is `true`, but the profile does
                                        not have a reservation.

                                        - `ProfileRequired`: The coupon's
                                        `isReservationMandatory` property is
                                        `true` or a [campaign profile
                                        budget](https://docs.talon.one/docs/product/campaigns/settings/manage-campaign-budgets)
                                        was set, but no profile exists in the
                                        session.
                                    conditionIndex:
                                      type: integer
                                      description: >-
                                        The index of the condition that caused
                                        the rejection of the coupon.
                                    effectIndex:
                                      type: integer
                                      description: >-
                                        The index of the effect that caused the
                                        rejection of the coupon.
                                    details:
                                      type: string
                                      description: More details about the failure.
                                    campaignExclusionReason:
                                      type: string
                                      example: CampaignGaveLowerDiscount
                                      description: >-
                                        The reason why the campaign the coupon
                                        belongs to was excluded during [campaign
                                        evaluation](https://docs.talon.one/docs/product/applications/manage-campaign-evaluation),
                                        when `rejectionReason` was
                                        `CouponPartOfNotTriggeredCampaign`.

                                        Its possible values are:


                                        - `CampaignGaveLowerDiscount`: The
                                        required campaign and coupon conditions
                                        were met, but another campaign in a
                                        [Highest discount
                                        value](https://docs.talon.one/docs/product/applications/manage-campaign-evaluation#set-campaign-evaluation-mode)
                                        group offered a higher discount value.

                                        - `CampaignIsNotFirst`: The campaign was
                                        not evaluated because another campaign
                                        in a [First
                                        campaign](https://docs.talon.one/docs/product/applications/manage-campaign-evaluation#set-campaign-evaluation-mode)
                                        group was picked and evaluated first.

                                        - `CampaignNotInEvaluationSet`: The
                                        campaign did not meet other evaluation
                                        requirements, for example, because the
                                        coupon is part of an archived campaign.
                                - type: object
                                  title: rejectReferral
                                  description: >-
                                    This effect indicates that the provided
                                    referral code is invalid.
                                  example:
                                    value: REF-ABC123
                                    rejectionReason: ReferralRejectedCondition
                                    conditionIndex: 1
                                    effectIndex: 0
                                    details: Referral code already used
                                    campaignExclusionReason: CampaignGaveLowerDiscount
                                  required:
                                    - value
                                    - rejectionReason
                                  properties:
                                    value:
                                      type: string
                                      description: The referral code that was rejected
                                    rejectionReason:
                                      type: string
                                      description: >-
                                        The reason why the code was rejected.


                                        - `AdvocateNotFound`: The advocate was
                                        not found.

                                        - `CampaignLimitReached`: The
                                        campaign-wide referral code redemption
                                        limit has been reached.

                                        - `EffectCouldNotBeApplied`: One of the
                                        effects in the campaign wasn't applied
                                        because a limit for that effect was
                                        reached (most common use case will be
                                        `setDiscount` can not be applied because
                                        a discount limit is reached).

                                        - `ProfileLimitReached`: The
                                        profile-specific referral code
                                        redemption limit has been reached.

                                        - `ReferralCustomerAlreadyReferred`: The
                                        friend is already referred.

                                        - `ReferralExpired`: The transferred
                                        referral code is expired.

                                        - `ReferralLimitReached`: The referral
                                        code redemption limit has been reached.

                                        - `ReferralNotFound`: The transferred
                                        referral code is wrong.

                                        - `ReferralPartOfNotRunningCampaign`:
                                        The campaign the referral code belongs
                                        to is currently not active. The campaign
                                        ID field shows the ID of that campaign.

                                        - `ReferralRecipientDoesNotMatch`: The
                                        given referral code value does not match
                                        the recipient.

                                        - `ReferralRecipientIdSameAsAdvocate`:
                                        The recipient (friend) has the same id
                                        as the advocate.

                                        - `ReferralRejectedByCondition`: The
                                        referral code is valid and in an active
                                        campaign, but there were other
                                        conditions in that campaign's rules that
                                        were not met.

                                        - `ReferralStartDateInFuture`: The
                                        transferred referral code isn't active
                                        yet.

                                        - `ReferralPartOfNotTriggeredCampaign`:
                                        The campaign the referral code belongs
                                        to was not triggered during evaluation
                                        (an exclusive or stackable campaign).
                                        The campaign ID field shows the ID of
                                        that campaign.
                                    conditionIndex:
                                      type: integer
                                      description: >-
                                        The index of the condition that caused
                                        the rejection of the referral.
                                    effectIndex:
                                      type: integer
                                      description: >-
                                        The index of the effect that caused the
                                        rejection of the referral.
                                    details:
                                      type: string
                                      description: More details about the failure.
                                    campaignExclusionReason:
                                      type: string
                                      example: CampaignGaveLowerDiscount
                                      description: >-
                                        The reason why the campaign the referral
                                        belongs to was excluded during [campaign
                                        evaluation](https://docs.talon.one/docs/product/applications/manage-campaign-evaluation),
                                        when `rejectionReason` was
                                        `CouponPartOfNotTriggeredCampaign`.

                                        Its possible values are:


                                        - `CampaignGaveLowerDiscount`: The
                                        required campaign and referral
                                        conditions were met, but another
                                        campaign in a [Highest discount
                                        value](https://docs.talon.one/docs/product/applications/manage-campaign-evaluation#set-campaign-evaluation-mode)
                                        group offered a higher discount value.

                                        - `CampaignIsNotFirst`: The campaign was
                                        not evaluated because another campaign
                                        in a [First
                                        campaign](https://docs.talon.one/docs/product/applications/manage-campaign-evaluation#set-campaign-evaluation-mode)
                                        group was picked and evaluated first.

                                        - `CampaignNotInEvaluationSet`: The
                                        campaign did not meet other evaluation
                                        requirements, for example, because the
                                        referral is part of an archived
                                        campaign.
                                - type: object
                                  title: couponCreated
                                  description: >-
                                    This effect indicates that a coupon was
                                    created.


                                    For referrals and retention marketing, a
                                    common use case is to generate a coupon that
                                    can only be redeemed by one specific
                                    customer.


                                    Handle this effect by notifying the
                                    recipient about their new coupon code.
                                  example:
                                    value: COUP-NEW123
                                    profileId: customer_profile_id_1
                                  required:
                                    - value
                                    - profileId
                                  properties:
                                    value:
                                      type: string
                                      description: The coupon code that was created.
                                    profileId:
                                      type: string
                                      description: >-
                                        The integration identifier of the
                                        customer for whom this coupon was
                                        created.
                                - type: object
                                  title: referralCreated
                                  description: >-
                                    The `referralCreated` effect behaves
                                    similarly to
                                    [couponCreated](https://docs.talon.one/docs/dev/integration-api/api-effects#couponcreated).
                                    If the `friendProfileIntegrationId`
                                    parameter is empty, the referral code can be
                                    redeemed by anyone.
                                  example:
                                    value: REF-NEW456
                                  required:
                                    - value
                                  properties:
                                    value:
                                      type: string
                                      description: >-
                                        The referral code provided in the
                                        session.
                                - type: object
                                  title: setDiscount
                                  description: >-
                                    This effect indicates that a discount should
                                    be set on the total shopping cart value of
                                    the current order with the given label and
                                    amount.


                                    The discount should overwrite any existing
                                    discount with the same name. The most recent
                                    integration state update always returns the
                                    latest values for **all** effects,
                                    effectively overwriting any previous
                                    effects.


                                    Enabling [partial
                                    discounts](https://docs.talon.one/docs/product/applications/manage-general-settings#partial-discounts)
                                    allows a rule that would fail because of
                                    insufficient budget to pass. The rule still
                                    fails when the budget reaches `0`. Use the
                                    `desiredValue` property to identify the
                                    original value of the discount.
                                  example:
                                    name: 10% Off
                                    value: 2.5
                                    scope: sessionTotal
                                    desiredValue: 2.5
                                  required:
                                    - name
                                    - value
                                  properties:
                                    name:
                                      type: string
                                      description: >-
                                        The name or description of this
                                        discount.
                                    value:
                                      type: number
                                      description: >-
                                        The monetary value of the effective
                                        discount.
                                    scope:
                                      type: string
                                      description: >-
                                        What the discount applies to. Possible
                                        values:


                                        - `cartItems`: Discount on the price of
                                        the items.

                                        - `additionalCosts`: Discount on the
                                        [additional
                                        costs](https://docs.talon.one/docs/product/account/dev-tools/manage-additional-costs)
                                        of the items.

                                        - `sessionTotal`: Discount on the total
                                        value of the customer session.


                                        **Note:** [Cascading
                                        discounts](https://docs.talon.one/docs/product/applications/manage-general-settings#cascading-discounts)
                                        must be enabled for this property to be
                                        returned.
                                    desiredValue:
                                      type: number
                                      description: >-
                                        _(Partial discounts enabled only)_ The
                                        monetary value of the discount to be
                                        applied without considering budget
                                        limitations.
                                - type: object
                                  title: setDiscountPerItem
                                  description: >-
                                    This effect schema is returned when you use
                                    the **Discount individual items**,
                                    **Discount individual items pro rata**, or
                                    **Discount individual item in bundles**
                                    effect in a rule.


                                    It indicates that a discount per item should
                                    be applied on the specific item specified in
                                    the effect.


                                    The properties it contains depends on:


                                    - Whether you used a pro rata effect or not.

                                    - Whether you used an effect with bundles or
                                    not.

                                    - Whether the partial discount feature is
                                    enabled.
                                  example:
                                    name: 'Discount on item #1'
                                    value: 1.5
                                    position: 1
                                    subPosition: 1
                                    desiredValue: 1.5
                                    scope: price
                                    totalDiscount: 1.5
                                    desiredTotalDiscount: 1.5
                                    bundleIndex: 1
                                    bundleName: my_bundle
                                    targetedItemPosition: 1
                                    targetedItemSubPosition: 1
                                    excludedFromPriceHistory: false
                                  required:
                                    - name
                                    - value
                                    - position
                                  properties:
                                    name:
                                      type: string
                                      description: >-
                                        The description of this discount.
                                        `#number` is equal to the `position`
                                        property.
                                    value:
                                      type: number
                                      description: >-
                                        The monetary value of the effective
                                        discount applied to the item.
                                    position:
                                      type: number
                                      description: >-
                                        The index of the item in the `cartItem`
                                        object on which this discount should be
                                        applied.
                                    subPosition:
                                      type: number
                                      description: >-
                                        The index of the item unit in its line
                                        item.
                                    desiredValue:
                                      type: number
                                      description: >-
                                        _(Partial discounts enabled only)_ The
                                        monetary value of the discount to be
                                        applied to the item without considering
                                        budget limitations.
                                    scope:
                                      type: string
                                      description: >-
                                        What the discount applies to. Possible
                                        values:


                                        - `price`: discount on the price of the
                                        item.

                                        - `additionalCosts`: discount on the
                                        [additional
                                        cost](https://docs.talon.one/docs/product/account/dev-tools/manage-additional-costs)
                                        of the item.

                                        - `itemTotal`: discount on the sum of
                                        price + additional cost of the item.
                                    totalDiscount:
                                      type: number
                                      description: >-
                                        _(Pro rata discounts only)_ The monetary
                                        value of the total effective discount
                                    desiredTotalDiscount:
                                      type: number
                                      description: >-
                                        _(Pro rata discounts only)_ The monetary
                                        value of the total discount to be
                                        applied without considering budget
                                        limitations
                                    bundleIndex:
                                      type: integer
                                      description: >-
                                        _(Discounts with bundles only)_ The
                                        position of the specific item bundle in
                                        the list of bundles created from the
                                        same bundle definition.
                                    bundleName:
                                      type: string
                                      description: >-
                                        _(Discounts with bundles only)_ The name
                                        of the bundle definition.
                                    targetedItemPosition:
                                      type: number
                                      description: >-
                                        _(Discounting individual item in bundles
                                        only)_ The index of the targeted bundle
                                        item on which the applied discount is
                                        based.
                                    targetedItemSubPosition:
                                      type: number
                                      description: >-
                                        _(Discounting individual item in bundles
                                        only)_ The sub-position of the targeted
                                        bundle item on which the applied
                                        discount is based.
                                    excludedFromPriceHistory:
                                      type: boolean
                                      description: >-
                                        When set to `true`, the applied discount
                                        is excluded from the item's price
                                        history.
                                - type: object
                                  title: setDiscountPerAdditionalCost
                                  description: >-
                                    This effect indicates that a discount that
                                    should be applied on a specific additional
                                    cost. It is triggered whenever a rule
                                    containing a **Discount additional cost**
                                    effect is validated.


                                    Enabling [partial
                                    rewards](https://docs.talon.one/docs/product/applications/manage-general-settings#partial-rewards)
                                    allows a rule that would fail because of
                                    insufficient budget to pass. The rule still
                                    fails when the budget reaches 0. Use the
                                    `desiredValue` property to identify the
                                    original amount of loyalty points.
                                  example:
                                    name: Shipping discount
                                    additionalCostId: 1
                                    additionalCost: shipping
                                    value: 4.99
                                    desiredValue: 4.99
                                  required:
                                    - name
                                    - value
                                    - additionalCostId
                                    - additionalCost
                                  properties:
                                    name:
                                      type: string
                                      description: The name of the discount.
                                    additionalCostId:
                                      type: integer
                                      description: The identifier of the additional cost.
                                    additionalCost:
                                      type: string
                                      description: The API name of the additional cost.
                                    value:
                                      type: number
                                      description: >-
                                        The monetary value of the discount to
                                        apply.
                                    desiredValue:
                                      type: number
                                      description: >-
                                        _(Partial discounts enabled only)_ The
                                        monetary value of the discount to be
                                        applied without considering budget
                                        limitations.
                                - type: object
                                  title: triggerWebhook
                                  description: >-
                                    This effect is triggered when a rule
                                    containing a [webhook
                                    effect](https://docs.talon.one/docs/product/rules/effects/available-effects#webhooks)
                                    is validated. The details are shared with
                                    you for your information only. It usually
                                    doesn't require an action on your side.
                                  example:
                                    webhookId: 7
                                    webhookName: My Webhook
                                  required:
                                    - webhookId
                                    - webhookName
                                  properties:
                                    webhookId:
                                      type: number
                                      description: The internal ID of the webhook.
                                    webhookName:
                                      type: string
                                      description: The name of the webhook.
                                - type: object
                                  title: addLoyaltyPoints
                                  description: >-
                                    This effect indicates that a defined amount
                                    of loyalty points was successfully added to
                                    the customer's profile or to a loyalty card.


                                    If you use the [Add loyalty points per item
                                    effect](https://docs.talon.one/docs/product/rules/effects/available-effects#reward-effects),
                                    use the `cartItemPosition` property to
                                    identify which item to add the loyalty
                                    points for.


                                    Enabling [partial
                                    rewards](https://docs.talon.one/docs/product/applications/manage-general-settings#partial-rewards)
                                    allows a rule that would fail because of
                                    insufficient budget to pass. The rule still
                                    fails when the budget reaches 0. Use the
                                    `desiredValue` property to identify the
                                    original amount of loyalty points.


                                    If you use **Add loyalty points per item**
                                    and if the session contains some cart items
                                    with _quantity > 1_, use the
                                    `cartItemSubPosition` property to identify
                                    the item unit in its line item. See the
                                    example below for more information.


                                    If your list of cart items is a [bundle
                                    definition](https://docs.talon.one/docs/product/rules/create-and-manage-bundles),
                                    use the `bundleIndex` and `bundleName`
                                    properties to identify the bundle containing
                                    the items for which loyalty points are
                                    added.


                                    If you have set custom activation and
                                    expiration dates for the loyalty points, use
                                    the `startDate` and `expiryDate` properties
                                    to identify when the reward will be active
                                    and when will expire.


                                    If the loyalty program is
                                    [profile-based](https://docs.talon.one/docs/product/loyalty-programs/overview#loyalty-program-types),
                                    use the `recipientIntegrationId` property to
                                    identify the user who receives the loyalty
                                    points. If the loyalty program is
                                    [card-based](https://docs.talon.one/docs/product/loyalty-programs/overview#loyalty-program-types),
                                    use the `cardIdentifier` property to
                                    identify the loyalty card on which these
                                    points are added.


                                    The points only persist when the session is
                                    closed.
                                  example:
                                    name: Points for purchase
                                    programId: 5
                                    subLedgerId: main
                                    value: 100
                                    desiredValue: 100
                                    recipientIntegrationId: URNGV8294NV
                                    startDate: '2024-01-01T00:00:00Z'
                                    expiryDate: '2025-01-01T00:00:00Z'
                                    transactionUUID: 8c2d3670-6ea5-4e9e-b5c6-e7e7b4a10111
                                    cartItemPosition: 1
                                    cartItemSubPosition: 1
                                    cardIdentifier: loyalty-card-001
                                    bundleIndex: 1
                                    bundleName: my_bundle
                                    awaitsActivation: false
                                    validityDuration: 12M
                                  required:
                                    - name
                                    - programId
                                    - subLedgerId
                                    - value
                                    - recipientIntegrationId
                                    - transactionUUID
                                  properties:
                                    name:
                                      type: string
                                      description: >-
                                        The reason of this loyalty point
                                        addition.
                                    programId:
                                      type: integer
                                      description: >-
                                        The ID of the loyalty program where
                                        these points were added.
                                    subLedgerId:
                                      type: string
                                      description: >-
                                        The ID of the subledger within the
                                        loyalty program where these points were
                                        added.
                                    value:
                                      type: number
                                      description: The amount of points that were added.
                                    desiredValue:
                                      type: number
                                      description: >-
                                        (Partial rewards enabled only) The
                                        amount of loyalty points to be awarded
                                        without considering budget limitations.
                                    recipientIntegrationId:
                                      type: string
                                      maxLength: 1000
                                      description: >-
                                        The user for whom these points were
                                        added.
                                      example: URNGV8294NV
                                    startDate:
                                      type: string
                                      format: date-time
                                      description: >-
                                        The date after which the added points
                                        will be valid.
                                    expiryDate:
                                      type: string
                                      format: date-time
                                      description: >-
                                        The date after which the added points
                                        will expire.
                                    transactionUUID:
                                      type: string
                                      description: >-
                                        The identifier of this loyalty point
                                        transaction.
                                    cartItemPosition:
                                      type: number
                                      description: >-
                                        (_Add points per cart item_ only.) The
                                        index of the item in the `cartItem`
                                        object for which these points were
                                        added.
                                    cartItemSubPosition:
                                      type: number
                                      description: >-
                                        (_Add points per cart item_ ) The index
                                        of the item unit in its line item.
                                    cardIdentifier:
                                      description: >-
                                        The identifier of the card on which
                                        these points were added.
                                      type: string
                                      maxLength: 108
                                      minLength: 4
                                      pattern: ^[A-Za-z0-9._%+@-]+$
                                      example: summer-loyalty-card-0543
                                    bundleIndex:
                                      type: integer
                                      description: >-
                                        _(With bundles only)_ The position of
                                        the specific bundle in the list of
                                        bundles created from the same bundle
                                        definition.
                                    bundleName:
                                      type: string
                                      description: >-
                                        _(With bundles only)_ The name of the
                                        bundle definition.
                                    awaitsActivation:
                                      type: boolean
                                      description: >-
                                        Indicates whether the points have an
                                        action-based start date. This property
                                        is returned only for point transactions
                                        with an action-based start date.
                                    validityDuration:
                                      type: string
                                      description: >-
                                        The duration for which the points remain
                                        active, calculated relative to their
                                        start date.
                                - type: object
                                  title: deductLoyaltyPoints
                                  description: >-
                                    This effect is triggered when a customer
                                    redeems loyalty points. The points are
                                    deducted from their active point balance.


                                    If the loyalty program is card-based, use
                                    the `cardIdentifier` property to identify
                                    the loyalty card from which these points are
                                    deducted.


                                    The Rule Engine deducts points in this
                                    order:


                                    - Points with the earliest expiry date are
                                    deducted first, regardless of when they were
                                    added.

                                    - Points with an unlimited expiry date are
                                    deducted last.

                                    - For points with an unlimited expiry date,
                                    the points awarded first are deducted first.


                                    The points only persist when the session is
                                    closed.
                                  example:
                                    ruleTitle: Deduct points on return
                                    programId: 5
                                    subLedgerId: main
                                    value: 50
                                    transactionUUID: 9f3e4781-7fb6-5f0f-c6d7-f8f8c5b21222
                                    name: Points deducted for return
                                    cardIdentifier: loyalty-card-001
                                  required:
                                    - ruleTitle
                                    - programId
                                    - subLedgerId
                                    - value
                                    - transactionUUID
                                    - name
                                  properties:
                                    ruleTitle:
                                      type: string
                                      description: >-
                                        The title of the rule that contained
                                        triggered this points deduction.
                                    programId:
                                      type: integer
                                      description: >-
                                        The ID of the loyalty program from which
                                        these points were deducted.
                                    subLedgerId:
                                      type: string
                                      description: >-
                                        The ID of the subledger within the
                                        loyalty program from which these points
                                        were deducted.
                                    value:
                                      type: number
                                      description: The amount of points that were deducted.
                                    transactionUUID:
                                      type: string
                                      description: >-
                                        The identifier of this loyalty point
                                        transaction.
                                    name:
                                      type: string
                                      description: >-
                                        The reason of this loyalty points
                                        deduction.
                                    cardIdentifier:
                                      description: >-
                                        The identifier of the card from which
                                        these points were deducted.
                                      type: string
                                      maxLength: 108
                                      minLength: 4
                                      pattern: ^[A-Za-z0-9._%+@-]+$
                                      example: summer-loyalty-card-0543
                                - type: object
                                  title: changeLoyaltyTierLevel
                                  description: >-
                                    This effect indicates that a customer's
                                    loyalty tier has been upgraded.


                                    This effect is generated only when the [Add
                                    loyalty
                                    points](https://docs.talon.one/docs/product/rules/effects/use-effects#add-loyalty-points)
                                    and the [Add loyalty points per cart
                                    item](https://docs.talon.one/docs/product/rules/effects/use-effects#add-loyalty-points-per-cart-item)
                                    effects are triggered for a particular
                                    customer, and, as a result, the customer's
                                    loyalty tier is upgraded.
                                  example:
                                    ruleTitle: Tier upgrade on purchase
                                    programId: 5
                                    subLedgerId: main
                                    previousTierName: Silver
                                    newTierName: Gold
                                    expiryDate: '2025-12-31T23:59:59Z'
                                  required:
                                    - ruleTitle
                                    - programId
                                    - subLedgerId
                                    - newTierName
                                  properties:
                                    ruleTitle:
                                      type: string
                                      description: >-
                                        The title of the rule that triggered the
                                        tier upgrade.
                                    programId:
                                      type: integer
                                      description: >-
                                        The ID of the loyalty program where the
                                        points were added.
                                    subLedgerId:
                                      type: string
                                      description: >-
                                        The ID of the subledger within the
                                        loyalty program where the points were
                                        added.
                                    previousTierName:
                                      type: string
                                      description: >-
                                        The name of the tier from which the user
                                        was upgraded.
                                    newTierName:
                                      type: string
                                      description: >-
                                        The name of the tier to which the user
                                        has been upgraded.
                                    expiryDate:
                                      type: string
                                      format: date-time
                                      description: The expiration date of the new tier.
                                - type: object
                                  title: addFreeItem
                                  description: >-
                                    This effect indicates that a free item
                                    should be added to the shopping cart in the
                                    current session. In this example, add the
                                    SKU to the shopping cart and set its price
                                    to `0`.


                                    The effect of a successful referral can mean
                                    a free item for someone else, such as the
                                    referrer.
                                  example:
                                    sku: SKU1241028
                                    name: Free Gift Item
                                    desiredQuantity: 1
                                  required:
                                    - sku
                                    - name
                                  properties:
                                    sku:
                                      type: string
                                      description: SKU of the item that needs to be added.
                                      example: SKU1241028
                                    name:
                                      type: string
                                      description: Description of the effect.
                                    desiredQuantity:
                                      type: integer
                                      description: >-
                                        The original quantity in case a partial
                                        reward was applied.
                                - type: object
                                  title: showNotification
                                  description: >-
                                    You can use notifications to inform
                                    customers of certain events. There are four
                                    types of notification messages:


                                    - `Info`

                                    - `Offer`

                                    - `Error`

                                    - `Misc`


                                    It is up to you to use the Rule Builder to
                                    decide why and when to show notifications.
                                    Notifications can be used as both rule
                                    effects and failure effects.


                                    A common use case is to display the
                                    notification at the top of the cart view in
                                    your web app. You can use the notification
                                    type to vary the styling of the notification
                                    message.
                                  example:
                                    notificationType: info
                                    title: Discount applied
                                    body: >-
                                      You have received a 10% discount on your
                                      order.
                                  required:
                                    - notificationType
                                    - title
                                    - body
                                  properties:
                                    notificationType:
                                      type: string
                                      description: The type of notification.
                                    title:
                                      type: string
                                      description: The title of the notification.
                                    body:
                                      type: string
                                      description: The body of the notification.
                                - type: object
                                  title: updateAttribute
                                  description: >-
                                    This effect indicates that a rule containing
                                    an [Update attribute
                                    value](https://docs.talon.one/docs/product/rules/effects/available-effects#update-effects)
                                    or [Update cart item attribute
                                    value](https://docs.talon.one/docs/product/rules/effects/available-effects#update-effects)
                                    was validated. You should update the value
                                    of the attribute in your system based on the
                                    content of the returned effect.
                                  example:
                                    path: Session.Attributes.loyaltyTier
                                    value: Gold
                                  required:
                                    - path
                                    - value
                                  properties:
                                    path:
                                      type: string
                                      description: The entity type and the attribute name.
                                    value:
                                      description: The new value of the attribute.
                                - type: object
                                  title: rollbackCoupon
                                  description: >-
                                    This effect indicates that a coupon code
                                    redemption has been rolled back. The coupon
                                    becomes redeemable again.


                                    The effect is triggered when you
                                    [cancel](https://docs.talon.one/docs/dev/concepts/entities/customer-sessions#manage-the-sessions-state)
                                    a session where a coupon was accepted. See
                                    an example of use in the [cancelling a
                                    session
                                    tutorial](https://docs.talon.one/docs/dev/tutorials/roll-back-effects).
                                  example:
                                    value: COUP-XYZ789
                                  required:
                                    - value
                                  properties:
                                    value:
                                      type: string
                                      description: >-
                                        The coupon code whose redemption has
                                        been rolled back.
                                - type: object
                                  title: rollbackReferral
                                  description: >-
                                    This effect indicates that the redemption of
                                    the referral code has been rolled back. It
                                    triggers when a closed session that redeemed
                                    a referral is gets cancelled. The code
                                    becomes redeemable again.


                                    For more information about session states,
                                    see [Managing
                                    states](https://docs.talon.one/docs/dev/concepts/entities/customer-sessions#customer-session-states).
                                  example:
                                    value: REF-ABC123
                                  required:
                                    - value
                                  properties:
                                    value:
                                      type: string
                                      description: The referral code to be rolled back.
                                - type: object
                                  title: rollbackDiscount
                                  description: >-
                                    This effect indicates that a discounted
                                    session, cart item, or additional cost has
                                    been cancelled or partially returned. This
                                    effect can only happen when you set the
                                    status of a session to `cancel` or the
                                    status changes to `partially_returned`.


                                    If the session contains some cart items with
                                    _quantity > 1_, use the
                                    `cartItemSubPosition` property to identify
                                    the specific item unit in its line item. See
                                    the example below.
                                  example:
                                    name: 10% Off
                                    value: 2.5
                                    cartItemPosition: 1
                                    cartItemSubPosition: 1
                                    additionalCostId: 1
                                    additionalCost: shipping
                                    scope: sessionTotal
                                  required:
                                    - name
                                    - value
                                  properties:
                                    name:
                                      type: string
                                      description: >-
                                        The name of the discount effect that was
                                        rolled back.
                                    value:
                                      type: number
                                      description: >-
                                        The monetary value of the discount that
                                        was rolled back.
                                    cartItemPosition:
                                      type: number
                                      description: >-
                                        The index of the item in the `cartItem`
                                        object whose discount was rolled back,
                                        or the unit containing the additional
                                        cost whose discount was rolled back.
                                    cartItemSubPosition:
                                      type: number
                                      description: >-
                                        The index of the item unit in its line
                                        item for which the discount was rolled
                                        back.
                                    additionalCostId:
                                      type: integer
                                      description: >-
                                        _Only when rolling back
                                        [setDiscountPerAdditionalCost](https://docs.talon.one/docs/dev/integration-api/api-effects#setdiscountperadditionalcost)
                                        and
                                        [setDiscountPerAdditionalCostPerItem](https://docs.talon.one/docs/dev/integration-api/api-effects#setdiscountperadditionalcostperitem)_
                                        The ID of the additional cost to be
                                        discounted.
                                    additionalCost:
                                      type: string
                                      description: >-
                                        The API name of the additional cost
                                        whose discount was rolled back.
                                    scope:
                                      type: string
                                      description: >-
                                        The scope of the rolled back discount.


                                        - For a discount per session, it can be
                                        one of `cartItems`, `additionalCosts` or
                                        `sessionTotal`

                                        - For a discount per item, it can be one
                                        of `price`, `additionalCosts` or
                                        `itemTotal`
                                - type: object
                                  title: rollbackAddedLoyaltyPoints
                                  description: >-
                                    This effect is triggered in the following
                                    cases:


                                    - A session was cancelled in which loyalty
                                    points have been added.

                                    - A session was partially returned and
                                    loyalty point were added by the returned
                                    items. See [returning
                                    items](https://docs.talon.one/docs/dev/tutorials/partially-return-a-session).


                                    If you use the [Add loyalty points per item
                                    effect](https://docs.talon.one/docs/product/rules/effects/available-effects#reward-effects),
                                    use the `cartItemPosition` property to
                                    identify which items the loyalty points were
                                    rolled back for.


                                    If you use **Add loyalty points per item**
                                    and if the session contains some cart items
                                    with _quantity > 1_, use the
                                    `cartItemSubPosition` property to identify
                                    the item unit in its line item.


                                    If the loyalty program is
                                    [profile-based](https://docs.talon.one/docs/product/loyalty-programs/overview#loyalty-program-types),
                                    use the `recipientIntegrationId` property to
                                    identify the user for whom the loyalty
                                    points are rolled back. If the loyalty
                                    program is
                                    [card-based](https://docs.talon.one/docs/product/loyalty-programs/overview#loyalty-program-types),
                                    use the `cardIdentifier` property to
                                    identify the loyalty card where the points
                                    were originally added.
                                  example:
                                    programId: 5
                                    subLedgerId: main
                                    value: 100
                                    recipientIntegrationId: URNGV8294NV
                                    transactionUUID: 8c2d3670-6ea5-4e9e-b5c6-e7e7b4a10111
                                    cartItemPosition: 1
                                    cartItemSubPosition: 1
                                    cardIdentifier: loyalty-card-001
                                  required:
                                    - programId
                                    - subLedgerId
                                    - value
                                    - recipientIntegrationId
                                    - transactionUUID
                                  properties:
                                    programId:
                                      type: integer
                                      description: >-
                                        The ID of the loyalty program where
                                        these points were rolled back.
                                    subLedgerId:
                                      type: string
                                      description: >-
                                        The ID of the subledger within the
                                        loyalty program where these points were
                                        rolled back.
                                    value:
                                      type: number
                                      description: >-
                                        The amount of points that were rolled
                                        back.
                                    recipientIntegrationId:
                                      type: string
                                      maxLength: 1000
                                      description: >-
                                        The user for whom these points were
                                        rolled back.
                                      example: URNGV8294NV
                                    transactionUUID:
                                      type: string
                                      description: >-
                                        The identifier of this loyalty point
                                        transaction.
                                    cartItemPosition:
                                      type: number
                                      description: >-
                                        (_Add points per cart item_ only.) The
                                        index of the item in the `cartItem`
                                        object for which these points were
                                        rolled back.
                                    cartItemSubPosition:
                                      type: number
                                      description: >-
                                        (_Add points per cart item_ ) The index
                                        of the item unit in its line item.
                                    cardIdentifier:
                                      description: >-
                                        The identifier of the card on which
                                        these points were originally added.
                                      type: string
                                      maxLength: 108
                                      minLength: 4
                                      pattern: ^[A-Za-z0-9._%+@-]+$
                                      example: summer-loyalty-card-0543
                                - type: object
                                  title: rollbackDeductedLoyaltyPoints
                                  description: >-
                                    This effect is triggered in the following
                                    cases:


                                    - A session is _cancelled_ and this session
                                    deducted loyalty points. The rollback action
                                    returns the redeemed loyalty points to the
                                    customer.

                                    - A session is impacted by a _partial
                                    return_. Only added loyalty points that are
                                    still **pending** are rolled back.

                                    - A session in which loyalty points were
                                    spent is reopened.


                                    See the [session
                                    states](https://docs.talon.one/docs/dev/concepts/entities/customer-sessions#customer-session-states).


                                    If you set custom activation and expiration
                                    dates for the loyalty points, use the
                                    `startDate` and `expiryDate` properties to
                                    identify when the reward will be active and
                                    when will expire.


                                    If the loyalty program is
                                    [profile-based](https://docs.talon.one/docs/product/loyalty-programs/profile-based/profile-based-overview),
                                    use the `recipientIntegrationId` property to
                                    identify the user who receives the loyalty
                                    points. If the loyalty program is
                                    [card-based](https://docs.talon.one/docs/product/loyalty-programs/overview#loyalty-program-types),
                                    use the `cardIdentifier` property to
                                    identify the loyalty card where the points
                                    are reimbursed.
                                  example:
                                    programId: 5
                                    subLedgerId: main
                                    value: 50
                                    recipientIntegrationId: URNGV8294NV
                                    startDate: '2024-01-01T00:00:00Z'
                                    expiryDate: '2025-01-01T00:00:00Z'
                                    transactionUUID: 9f3e4781-7fb6-5f0f-c6d7-f8f8c5b21222
                                    cardIdentifier: loyalty-card-001
                                  required:
                                    - programId
                                    - subLedgerId
                                    - value
                                    - recipientIntegrationId
                                    - transactionUUID
                                  properties:
                                    programId:
                                      type: integer
                                      description: >-
                                        The ID of the loyalty program where
                                        these points were reimbursed.
                                    subLedgerId:
                                      type: string
                                      description: >-
                                        The ID of the subledger within the
                                        loyalty program where these points were
                                        reimbursed.
                                    value:
                                      type: number
                                      description: >-
                                        The amount of points that were
                                        reimbursed.
                                    recipientIntegrationId:
                                      type: string
                                      maxLength: 1000
                                      description: >-
                                        The user for whom these points were
                                        reimbursed.
                                      example: URNGV8294NV
                                    startDate:
                                      type: string
                                      format: date-time
                                      description: >-
                                        The date after which the reimbursed
                                        points will be valid.
                                    expiryDate:
                                      type: string
                                      format: date-time
                                      description: >-
                                        The date after which the reimbursed
                                        points will expire.
                                    transactionUUID:
                                      type: string
                                      description: >-
                                        The identifier of this loyalty point
                                        transaction.
                                    cardIdentifier:
                                      description: >-
                                        The identifier of the card from which
                                        these points were originally deducted.
                                      type: string
                                      maxLength: 108
                                      minLength: 4
                                      pattern: ^[A-Za-z0-9._%+@-]+$
                                      example: summer-loyalty-card-0543
                                - type: object
                                  title: showBundleMetadata
                                  description: >-
                                    This effect is **deprecated**.


                                    The `ShowBundleMetadata` effect contains
                                    information that allows you to associate

                                    the discounts from a rule in a bundle
                                    campaign with specific cart items.

                                    This way you can distinguish from "normal"
                                    discounts that were not the result of a
