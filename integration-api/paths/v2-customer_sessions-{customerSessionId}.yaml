                                  example:
                                    shipping:
                                      price: 9
                                catalogItemID:
                                  title: The catalog item ID
                                  type: integer
                                  readOnly: true
                                  description: The catalog item ID.
                                selectedPriceType:
                                  title: Price Type
                                  type: string
                                  readOnly: true
                                  description: >-
                                    The selected price type for this cart item
