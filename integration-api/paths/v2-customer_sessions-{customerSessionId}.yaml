                                    - description
                                    - bundleAttributes
                                    - itemsIndices
                                  properties:
                                    description:
                                      type: string
                                      description: Description of the product bundle.
                                    bundleAttributes:
                                      type: array
                                      items:
                                        type: string
                                      description: >-
                                        The cart item attributes that determined
                                        which items are being bundled together.
                                    itemsIndices:
                                      type: array
                                      items:
                                        type: number
                                      description: >-
                                        The indices in the cart items array of
                                        the bundled items.
                                - type: object
                                  title: awardGiveaway
                                  description: >-
                                    This effect indicates the awarded giveaway
                                    item and to which profile the item was
                                    awarded. Learn more about
                                    [giveaways](https://docs.talon.one/docs/product/giveaways/overview).
                                  example:
                                    poolId: 2
                                    poolName: My pool
                                    recipientIntegrationId: URNGV8294NV
                                    giveawayId: 5
                                    code: 57638t-67439hty
                                  required:
                                    - poolId
                                    - poolName
                                    - recipientIntegrationId
                                    - giveawayId
                                    - code
                                  properties:
                                    poolId:
                                      type: integer
                                      description: The internal ID of the giveaway pool.
                                      example: 2
                                    poolName:
                                      type: string
                                      description: The name of the giveaway pool.
                                      example: My pool
                                    recipientIntegrationId:
                                      type: string
                                      maxLength: 1000
                                      description: >-
                                        The integration ID of the customer that
                                        receives the giveaway.
                                      example: URNGV8294NV
                                    giveawayId:
                                      type: integer
                                      description: The internal ID of the giveaway.
                                      example: 5
                                    code:
                                      type: string
                                      description: The giveaway code to be rewarded.
                                      example: 57638t-67439hty
                                - type: object
                                  title: willAwardGiveaway
                                  description: >-
                                    The equivalent of the `awardGiveaway` effect
                                    but returned when updating a session with
                                    any state other than `closed`. This ensures
                                    no giveaway codes are leaked when they are
                                    still not guaranteed to be awarded.


                                    For more information about session states,
                                    see [Manage the session's
                                    state](https://docs.talon.one/docs/dev/concepts/entities/customer-sessions#manage-the-sessions-state).
                                  example:
                                    poolId: 2
                                    poolName: My pool
