                              properties:
                                identifier:
                                  type: string
                                  description: >
                                    The identifier of the loyalty card, which
                                    must match the regular expression
                                    `^[A-Za-z0-9._%+@-]+$`.
                                  maxLength: 108
                                  minLength: 4
                                  pattern: ^[A-Za-z0-9._%+@-]+$
                                  example: summer-loyalty-card-0543
                                usersPerCardLimit:
                                  type: integer
                                  minimum: 0
                                  example: 111
                                  description: >
                                    The max amount of customer profiles that can
                                    be linked to the card. 0 means unlimited.
                                profiles:
                                  type: array
                                  description: >-
                                    Integration IDs of the customers profiles
                                    linked to the card.
                                  items:
                                    type: object
                                    required:
                                      - integrationId
                                      - timestamp
                                    properties:
                                      integrationId:
                                        type: string
                                        maxLength: 1000
                                        description: >-
                                          Integration ID of the customer profile
                                          linked to the card.
                                        example: R195412
                                      timestamp:
                                        type: string
                                        format: date-time
                                        description: >-
                                          Timestamp the customer profile was
                                          linked to the card.
                                        example: '2021-09-12T10:12:42Z'
                                ledger:
                                  description: >-
                                    Displays point balances of the card in the
                                    main ledger of the loyalty program.
                                  allOf:
                                    - type: object
                                      required:
                                        - currentBalance
                                        - pendingBalance
                                        - expiredBalance
                                        - spentBalance
                                        - tentativeCurrentBalance
                                      description: >-
                                        The balance in a Loyalty Program for
                                        some Customer.
                                      properties:
                                        currentBalance:
                                          type: number
                                          title: Current balance
                                          description: Sum of currently active points.
                                          example: 100
                                        pendingBalance:
                                          type: number
                                          title: Pending balance
                                          description: Sum of pending points.
                                          example: 10
                                        negativeBalance:
                                          type: number
                                          title: Negative balance
                                          description: >-
                                            Sum of negative points. This implies
                                            that `currentBalance` is `0`.
                                          example: 10
                                        expiredBalance:
                                          type: number
                                          title: Expired balance
                                          description: |
                                            **DEPRECATED** Value is shown as 0.
                                          example: 0
                                        spentBalance:
                                          type: number
                                          title: Spent balance
                                          description: |
                                            **DEPRECATED** Value is shown as 0.
                                          example: 0
                                        tentativeCurrentBalance:
                                          type: number
                                          title: Tentative current balance
                                          description: >
                                            The tentative points balance, reflecting
                                            the `currentBalance` and all point
                                            additions and deductions within the
                                            current open customer session. When the
                                            session is closed, the effects are
                                            applied and the `currentBalance` is
                                            updated to this value.


                                            **Note:** Tentative balances are
                                            specific to the current session and do
                                            not take into account other open
                                            sessions for the given customer.
                                          example: 100
                                        tentativePendingBalance:
                                          type: number
