# path: /v3/events/{integrationId}
get:
  operationId: getEventV3
  summary: Get Events
  description: |
    Returns an Event by its identifier.
  security:
    - api_key_v1: []
  tags:
    - Events
  parameters:
    - name: integrationId
      in: path
      description: The identifier of the occurrence.
      required: true
      example: pe_12345
      schema:
        type: string
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            allOf:
              - type: object
                properties:
                  connectedSessionId:
                    type: string
                    description: >-
                      The ID of the session to reference. The session must be in
                      `closed` state. Otherwise, the API call will fail.
                    minLength: 1
                    example: 175KJPS947296
              - type: object
                required:
                  - id
                  - created
                properties:
                  id:
                    type: integer
                    description: The internal ID of this entity.
                    example: 6
                  created:
                    type: string
                    format: date-time
                    description: The time this entity was created.
                    example: '2020-06-10T09:05:27.993483Z'
              - type: object
                required:
                  - applicationId
                properties:
                  applicationId:
                    type: integer
                    description: The ID of the Application that owns this entity.
                    example: 322
              - allOf:
                  - type: object
                    properties:
                      profileId:
                        type: string
                        description: >
                          ID of the customer profile set by your integration
                          layer.


                          **Note:** If the customer does not yet have a known
                          `profileId`, we recommend you use a guest `profileId`.
                        example: URNGV8294NV
                  - type: object
                    properties:
                      storeIntegrationId:
                        type: string
                        minLength: 1
                        maxLength: 1000
                        description: >-
                          The integration ID of the store. You choose this ID
                          when you create a store.
                        example: STORE-001
                  - type: object
                    properties:
                      type:
                        type: string
                        title: Event Type
                        description: >-
                          The name of the event. Must be a [custom
                          event](https://docs.talon.one/docs/dev/concepts/entities/events#custom-events),
                          not a built-in event.
                        minLength: 1
                        example: pageViewed
                      attributes:
                        type: object
                        description: >-
                          Arbitrary additional JSON data associated with the
                          event.
                        example:
                          myAttribute: myValue
                    required:
                      - type
                      - attributes
              - type: object
                properties:
                  integrationId:
                    type: string
                    description: >
                      The unique ID of the event. Only one event with this ID
                      can be registered.
                    minLength: 1
                    example: 175KJPS947296
              - type: object
                required:
                  - effects
                properties:
                  effects:
                    type: array
                    description: >
                      An array of effects generated by the rules of the enabled
                      campaigns of the Application.


                      You decide how to apply them in your system. See the list
                      of [API
                      effects](https://docs.talon.one/docs/dev/integration-api/api-effects).
                    items:
                      type: array
                      items: {}
    '404':
      description: Not found
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              errors:
                type: array
                description: >-
                  An array of individual problems encountered during the
                  request.
                items:
                  type: object
                  required:
                    - source
                    - title
                  properties:
                    title:
                      type: string
                      description: Short description of the problem.
                    details:
                      type: string
                      description: >-
                        Longer description of this specific instance of the
                        problem.
                    source:
                      type: object
                      description: >
                        The source of the current error, exactly one of
                        `pointer`, `parameter` or `line` will be defined.
                      properties:
                        pointer:
                          type: string
                          description: >-
                            Pointer to the path in the payload that caused this
                            error.
                        parameter:
                          type: string
                          description: Query parameter that caused this error.
                        line:
                          type: string
                          description: >-
                            Line number in uploaded multipart file that caused
                            this error. 'N/A' if unknown.
                        resource:
                          type: string
                          description: Pointer to the resource that caused this error.
              StatusCode:
                type: integer
                description: The error code
