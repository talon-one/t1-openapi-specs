# path: /v1/applications/{applicationId}/campaigns/{campaignId}/value_maps/{valueMapId}/export
get:
  operationId: exportCampaignValueMap
  summary: Export campaign value map
  description: >
    > [!note] Management API endpoints are **not** meant to be used in real-time
    integrations that directly serve your end users. Rate limit: 3 requests per
    second.


    Download a CSV file containing all the value map items in a campaign. If

    there are multiple versions of the value map, only the items of the current

    version are exported.


    > [!tip] If the exported CSV file is too large to view, you can

    > [split it into multiple
    files](https://www.google.com/search?q=split+CSV+into+multiple+files).


    The generated file can contain the following columns:


    - `identifier`: The value of the attribute in the targeted item, for
    example, an item's SKU.

    - `value`: The value that is associated with the identifier, for example,
    the item's price.
  tags:
    - Value maps
  parameters:
    - name: applicationId
      in: path
      required: true
      description: >-
        The ID of the Application. It is displayed in your Talon.One deployment
        URL.
      example: 42
      schema:
        type: integer
    - name: campaignId
      in: path
      description: >-
        The ID of the campaign. It is displayed in your Talon.One deployment
        URL.
      example: 18
      required: true
      schema:
        type: integer
    - name: valueMapId
      required: true
      in: path
      description: |
        The ID of the value map.
      example: 17
      schema:
        type: integer
  responses:
    '200':
      description: OK
      content:
        application/csv:
          schema:
            type: string
            format: csv
          examples:
            response:
              value: |
                identifier,value
                sku-123,10.11
                sku-234,595
    '400':
      description: Bad request
      content:
        application/csv:
          schema:
            type: object
            properties:
              message:
                type: string
              errors:
                type: array
                description: >-
                  An array of individual problems encountered during the
                  request.
                items:
                  type: object
                  required:
                    - source
                    - title
                  properties:
                    title:
                      type: string
                      description: Short description of the problem.
                    details:
                      type: string
                      description: >-
                        Longer description of this specific instance of the
                        problem.
                    source:
                      type: object
                      description: >
                        The source of the current error, exactly one of
                        `pointer`, `parameter` or `line` will be defined.
                      properties:
                        pointer:
                          type: string
                          description: >-
                            Pointer to the path in the payload that caused this
                            error.
                        parameter:
                          type: string
                          description: Query parameter that caused this error.
                        line:
                          type: string
                          description: >-
                            Line number in uploaded multipart file that caused
                            this error. 'N/A' if unknown.
                        resource:
                          type: string
                          description: Pointer to the resource that caused this error.
              StatusCode:
