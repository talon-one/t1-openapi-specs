# path: /v1/loyalty_programs/{loyaltyProgramId}/import_join_dates
post:
  operationId: importLoyaltyJoinDates
  summary: Import join dates for a loyalty program
  description: >
    > [!note] Management API endpoints are **not** meant to be used in real-time
    integrations that directly serve your end users. Rate limit: 3 requests per
    second.


    Upload a CSV file containing customer profile IDs and their join dates for
    the

    specified loyalty program. Send the file as multipart data.


    > [!important] This endpoint only works with profile-based loyalty programs.


    The CSV file **must** contain the following columns:


    - `customerprofileid`: The integration ID of the customer profile whose join
      date you want to update.
    - `newjoindate`: The new join date for the customer in RFC3339 format. You
      can use the time zone of your choice. It is converted to UTC internally
      by Talon.One.

    **Note**:

    - Customer profiles must already exist. If a referenced profile does not
    exist, the import fails with a `400` error.

    - If a join date already exists for a profile, the uploaded date replaces
    it.


    > [!note] We recommend limiting your file size to 500 MB.


    ## Example


    ```csv

    customerprofileid,newjoindate

    customer1,2024-03-21T07:32:14Z

    customer2,2025-04-16T21:12:37Z

    customer3,2026-05-03T11:47:01Z

    ```
  tags:
    - Loyalty
  parameters:
    - name: loyaltyProgramId
      in: path
      required: true
      description: >
        Identifier of the profile-based loyalty program. You can get the ID with
        the [List loyalty
        programs](https://docs.talon.one/management-api#tag/Loyalty/operation/getLoyaltyPrograms)
        endpoint.
      example: 8
      schema:
        type: integer
  requestBody:
    required: true
    content:
      multipart/form-data:
        schema:
          type: object
          properties:
            upFile:
              description: The CSV file containing the data that is being imported.
              type: string
              format: binary
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            allOf:
              - type: object
                required:
                  - id
                  - created
                properties:
                  id:
                    type: integer
                    description: The internal ID of this entity.
                    example: 6
                  created:
                    type: string
                    format: date-time
                    description: The time this entity was created.
                    example: '2020-06-10T09:05:27.993483Z'
              - type: object
                required:
                  - accountId
                properties:
                  accountId:
                    type: integer
                    description: The ID of the account that owns this entity.
                    example: 3886
              - type: object
                required:
                  - userId
                properties:
                  userId:
                    type: integer
                    description: The ID of the user associated with this entity.
                    example: 388
              - type: object
                required:
                  - amount
                  - entity
                properties:
                  entity:
                    type: string
                    example: AttributeAllowedList
                    description: |
                      The name of the entity that was imported.
                  amount:
                    type: integer
                    minimum: 0
                    example: 10
                    description: The number of values that were imported.
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              errors:
                type: array
                description: >-
                  An array of individual problems encountered during the
                  request.
                items:
                  type: object
                  required:
                    - source
                    - title
                  properties:
                    title:
                      type: string
                      description: Short description of the problem.
                    details:
                      type: string
                      description: >-
                        Longer description of this specific instance of the
                        problem.
                    source:
                      type: object
                      description: >
                        The source of the current error, exactly one of
                        `pointer`, `parameter` or `line` will be defined.
                      properties:
                        pointer:
                          type: string
                          description: >-
                            Pointer to the path in the payload that caused this
                            error.
                        parameter:
                          type: string
                          description: Query parameter that caused this error.
                        line:
                          type: string
                          description: >-
                            Line number in uploaded multipart file that caused
                            this error. 'N/A' if unknown.
                        resource:
                          type: string
                          description: Pointer to the resource that caused this error.
              StatusCode:
                type: integer
                description: The error code
    '401':
