# path: /v1/applications/{applicationId}/cart_item_filters/{cartItemFilterId}/expressions/{expressionId}
get:
  operationId: getApplicationCartItemFilterExpression
  summary: Get Application cart item filter expression
  description: >-
    > [!note] Management API endpoints are **not** meant to be used in real-time
    integrations that directly serve your end users. Rate limit: 3 requests per
    second.


    Get an Application cart item filter expression for a specific Application.
  tags:
    - Applications
  parameters:
    - name: applicationId
      in: path
      required: true
      description: >-
        The ID of the Application. It is displayed in your Talon.One deployment
        URL.
      example: 42
      schema:
        type: integer
    - name: cartItemFilterId
      in: path
      description: >-
        The ID of the Application cart item filter. You can get this ID with the
        [List Application cart item
        filters](https://docs.talon.one/management-api#tag/Applications/operation/listApplicationCartItemFilters)
        endpoint.
      example: 20
      required: true
      schema:
        type: integer
    - name: expressionId
      in: path
      description: The ID of the Application cart item filter expression.
      example: 19
      required: true
      schema:
        type: integer
  responses:
    '200':
      description: Ok
      content:
        application/json:
          schema:
            allOf:
              - type: object
                required:
                  - id
                  - created
                properties:
                  id:
                    type: integer
                    description: The internal ID of this entity.
                    example: 6
                  created:
                    type: string
                    format: date-time
                    description: The time this entity was created.
                    example: '2020-06-10T09:05:27.993483Z'
              - type: object
                properties:
                  cartItemFilterId:
                    type: integer
                    description: The ID of the Application cart item filter.
                    example: 216
                  createdBy:
                    type: integer
                    description: >-
                      The ID of the user who created the Application cart item
                      filter.
                    example: 216
                  expression:
                    type: array
                    description: >-
                      Arbitrary additional JSON data associated with the
                      Application cart item filter.
                    example:
                      expr:
                        - filter
                        - - .
                          - Session
                          - CartItems
                        - - - Item
                          - - catch
                            - false
                            - - '='
                              - - .
                                - Item
                                - Category
                              - Kitchen
                    items: {}
              - type: object
                required:
                  - applicationId
                properties:
                  applicationId:
                    type: integer
                    description: The ID of the Application that owns this entity.
                    example: 322
