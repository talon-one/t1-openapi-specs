                                        example:
                                          poolId: 2
                                          poolName: My pool
                                          recipientIntegrationId: URNGV8294NV
                                          giveawayId: 5
                                          code: 57638t-67439hty
                                        required:
                                          - poolId
                                          - poolName
                                          - recipientIntegrationId
                                          - giveawayId
                                          - code
                                        properties:
                                          poolId:
                                            type: integer
