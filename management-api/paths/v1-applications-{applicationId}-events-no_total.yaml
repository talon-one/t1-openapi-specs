                                            type: string
                                            description: The name of the giveaway pool.
                                            example: My pool
                                          recipientIntegrationId:
                                            type: string
                                            maxLength: 1000
                                            description: >-
                                              The integration ID of the customer that
                                              receives the giveaway.
                                            example: URNGV8294NV
                                      - type: object
                                        title: error
                                        description: >-
                                          This effect is triggered whenever an
