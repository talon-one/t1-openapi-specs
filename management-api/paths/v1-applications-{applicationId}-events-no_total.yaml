                                          - message
                                        properties:
                                          message:
                                            type: string
                                            description: The error message.
                                      - type: object
                                        title: customEffect
                                        description: >-
                                          If you want to return data as an effect
                                          but no effect matches your use case, you
                                          can [create a custom
                                          effect](https://docs.talon.one/docs/dev/tutorials/create-custom-effects).


                                          Custom effects can be used as both rule
                                          effects and failure effects.


                                          The structure of a custom effect depends
                                          on your specifications but is always
                                          named `customEffect`.
                                        example:
                                          effectId: 1
                                          name: my_custom_effect
                                          cartItemPosition: 1
                                          cartItemSubPosition: 2
                                          bundleIndex: 1
                                          bundleName: my_bundle
                                          payload:
                                            key: value
                                        required:
                                          - effectId
                                          - name
                                          - payload
                                        properties:
                                          effectId:
                                            type: integer
                                            description: >-
                                              The ID of the custom effect that was
                                              triggered.
                                            example: 1
                                          name:
                                            type: string
                                            description: The type of the custom effect.
                                            example: my_custom_effect
                                          cartItemPosition:
                                            type: number
                                            description: >-
                                              The index of the item in the cart item
                                              list to which the custom effect is
                                              applied.
                                            example: 1
                                          cartItemSubPosition:
                                            type: number
                                            description: >
                                              For cart items with quantity > 1, the
                                              sub position indicates to which item
                                              unit the custom effect is applied.
                                            example: 2
                                          bundleIndex:
                                            type: integer
                                            description: >-
                                              The position of the bundle in a list of
                                              item bundles created from the same
                                              bundle definition.
                                            example: 1
                                          bundleName:
                                            type: string
                                            description: The name of the bundle definition.
                                            example: my_bundle
                                          payload:
                                            description: The JSON payload of the custom effect.
                                            type: object
                                            x-arbitraryJSON: true
                                      - type: object
                                        title: setDiscountPerAdditionalCostPerItem
                                        description: >-
                                          This effect indicates that a discount of
                                          a specific additional cost within a
                                          specific item should be applied. It gets
                                          triggered whenever a rule containing a
                                          **Discount additional cost per item**
                                          effect is validated.


                                          Use this effect when **all** items in
                                          the cart have an additional cost. If one
                                          of more items do not have an additional
                                          cost, the rule will fail.
                                        example:
                                          name: 'Shipping discount on item #1'
                                          additionalCostId: 1
                                          value: 4.99
                                          position: 1
                                          subPosition: 1
                                          additionalCost: shipping
                                          desiredValue: 4.99
                                        required:
                                          - name
                                          - value
                                          - additionalCostId
                                          - additionalCost
                                          - position
                                        properties:
                                          name:
                                            type: string
                                            description: >-
                                              The description of this discount.
                                              `#number` is appended to the name. It is
                                              equal to the `position` property.
                                          additionalCostId:
                                            type: integer
                                            description: >-
                                              The identifier of the additional cost to
                                              be discounted.
                                          value:
                                            type: number
                                            description: >-
                                              The monetary value of the effective
                                              discount applied to the item's
                                              additional cost.
                                          position:
                                            type: number
                                            description: >-
                                              The index of the item in the `cartItem`
                                              object containing the additional cost
                                              that this discount applies to.
                                          subPosition:
                                            type: number
                                            description: >-
                                              The index of the item unit in its line
                                              item.
                                          additionalCost:
                                            type: string
                                            description: >-
                                              The API name of the additional cost to
                                              be discounted.
                                          desiredValue:
                                            type: number
                                            description: >-
                                              _[(Partial discounts enabled
                                              only)](https://docs.talon.one/docs/product/applications/manage-general-settings#partial-discounts)_.
                                              The monetary value of the discount to be
                                              applied to the additional cost without
                                              considering budget limitations.
                                      - type: object
                                        title: reserveCoupon
                                        description: >-
                                          This effect indicates that the given
                                          coupon code was reserved for the given
                                          customer.


                                          Talon.One provides soft and hard
                                          reservations. For more information, see
                                          [Reserve a coupon
                                          code](https://docs.talon.one/docs/product/rules/effects/use-effects#reserve-a-coupon-code).
                                        example:
                                          couponValue: COUP-XYZ789
                                          profileIntegrationId: customer_profile_id_1
                                          isNewReservation: true
                                        required:
                                          - couponValue
                                          - profileIntegrationId
                                          - isNewReservation
                                        properties:
                                          couponValue:
                                            type: string
                                            description: The coupon code that was created.
                                          profileIntegrationId:
                                            type: string
                                            description: >-
                                              The integration identifier of the
                                              customer for whom this coupon was
                                              reserved.
                                          isNewReservation:
                                            type: boolean
                                            description: >-
                                              Indicates whether this is a new coupon
                                              reservation or not.
                                      - type: object
                                        title: addToAudience
                                        description: >-
                                          This effect is triggered when a rule
                                          containing an [Update
                                          audience](https://docs.talon.one/docs/product/rules/effects/use-effects#update-an-audience)
                                          effect with **Add customer to an
                                          audience** selected is validated. It
                                          indicates that a customer was added to
                                          an audience and is returned when a
                                          customer session is opened, updated, or
                                          closed.
                                        example:
                                          audienceId: 10
                                          audienceName: My audience
                                          profileIntegrationId: URNGV8294NV
                                          profileId: 150
                                        properties:
                                          audienceId:
                                            type: integer
                                            description: The internal ID of the audience.
                                            example: 10
                                          audienceName:
                                            type: string
                                            description: The name of the audience.
                                            example: My audience
                                          profileIntegrationId:
                                            type: string
                                            description: >-
                                              The ID of the customer profile in the
                                              third-party integration platform.
                                            example: URNGV8294NV
                                          profileId:
                                            type: integer
                                            description: The internal ID of the customer profile.
                                            example: 150
                                      - type: object
                                        title: removeFromAudience
                                        description: >-
                                          This effect is triggered when a rule
                                          containing an [Update
                                          audience](https://docs.talon.one/docs/product/rules/effects/use-effects#update-an-audience)
                                          effect with **Remove customer from an
                                          audience** selected is validated. It
                                          indicates that a customer was removed
                                          from an audience and is returned when a
                                          customer session is opened, updated, or
                                          closed.
                                        example:
                                          audienceId: 10
                                          audienceName: My audience
                                          profileIntegrationId: URNGV8294NV
                                          profileId: 150
                                        properties:
                                          audienceId:
                                            type: integer
                                            description: The internal ID of the audience.
                                            example: 10
                                          audienceName:
                                            type: string
                                            description: The name of the audience.
                                            example: My audience
                                          profileIntegrationId:
                                            type: string
                                            description: >-
                                              The ID of the customer profile in the
                                              third-party integration platform.
                                            example: URNGV8294NV
                                          profileId:
                                            type: integer
                                            description: The internal ID of the customer profile.
                                            example: 150
                                      - type: object
                                        title: increaseAchievementProgress
                                        description: >-
                                          This effect indicates that the
                                          customer's progress in an achievement
                                          was updated during the current session.
                                          It is triggered when a rule using the
                                          [Update customer
                                          progress](https://docs.talon.one/docs/product/rules/effects/use-effects#update-customer-progress)
                                          effect is successfully validated.


                                          For [on-completion
                                          achievements](https://docs.talon.one/docs/product/campaigns/achievements/achievements-overview#recurring-on-completion-achievements),
                                          any customer progress exceeding the
                                          target automatically starts a new
                                          iteration. This generates a new
                                          `progressTrackerId` for each iteration,
                                          and there can be multiple progress
                                          updates for the same achievement from a
                                          single validation of this effect.
                                        example:
                                          achievementId: 10
                                          achievementName: FreeCoffee10Orders
                                          progressTrackerId: 42
                                          delta: 1
                                          value: 7
                                          target: 10
                                          isJustCompleted: false
                                        required:
                                          - achievementId
                                          - achievementName
                                          - delta
                                          - value
                                          - target
                                          - isJustCompleted
                                        properties:
                                          achievementId:
                                            type: integer
                                            description: The internal ID of the achievement.
                                            example: 10
                                          achievementName:
                                            type: string
                                            description: The name of the achievement.
                                            example: FreeCoffee10Orders
                                          progressTrackerId:
                                            type: integer
                                            description: >-
                                              The internal ID of the customer progress
                                              tracker.

                                              For [on-completion
                                              achievements](https://docs.talon.one/docs/product/campaigns/achievements/achievements-overview#recurring-on-completion-achievements),
                                              this effect generates a unique ID for
                                              each iteration.
                                          delta:
                                            type: number
                                            description: >-
                                              The value by which the customer's
                                              current progress in the achievement has
                                              increased.
                                          value:
                                            type: number
                                            description: >-
                                              The current progress of the customer in
                                              the achievement.
                                          target:
                                            type: number
                                            description: >-
                                              The target value to complete the
                                              achievement.
                                          isJustCompleted:
                                            type: boolean
                                            description: >-
                                              Indicates if the customer has completed
                                              the achievement in the current session.
                                      - type: object
                                        title: rollbackIncreasedAchievementProgress
                                        description: >-
                                          This effect indicates that the
                                          customer's progress in an achievement
                                          was rolled back.


                                          The Rule Engine triggers this effect
                                          when you cancel or [reopen a customer
                                          session](https://docs.talon.one/integration-api#tag/Customer-sessions/operation/reopenCustomerSession)
                                          that previously validated the [Update
                                          customer
                                          progress](https://docs.talon.one/docs/product/rules/effects/use-effects#update-customer-progress)
                                          effect and triggered the
                                          [increaseAchievementProgress](https://docs.talon.one/docs/dev/integration-api/api-effects#increaseachievementprogress)
                                          API effect.


                                          The effect is also triggered for
                                          completed achievements if the **Allow
                                          progress rollback for completed
                                          achievements** setting is enabled. You
                                          can enable this through the [Campaign
                                          Manager](https://docs.talon.one/docs/product/campaigns/achievements/manage-achievements)
                                          or the [Management
                                          API](https://docs.talon.one/management-api#tag/Achievements/operation/createAchievement)
                                          by setting the
                                          `achievementAllowRollbackAfterCompletion`
                                          property to `true`. This setting only
                                          applies to one-time and recurring on
                                          expiration achievements.
                                        example:
                                          achievementId: 10
                                          achievementName: FreeCoffee10Orders
                                          progressTrackerId: 42
                                          decreaseProgressBy: 1
                                          currentProgress: 6
                                          target: 10
                                        required:
                                          - achievementId
                                          - achievementName
                                          - progressTrackerId
                                          - decreaseProgressBy
                                          - currentProgress
                                          - target
                                        properties:
                                          achievementId:
                                            type: integer
                                            description: The internal ID of the achievement.
                                            example: 10
                                          achievementName:
                                            type: string
                                            description: The name of the achievement.
                                            example: FreeCoffee10Orders
                                          progressTrackerId:
                                            type: integer
                                            description: >-
                                              The internal ID of the achievement
                                              progress tracker.
                                          decreaseProgressBy:
                                            type: number
                                            description: >-
                                              The value by which the customer's
                                              current progress in the achievement has
                                              decreased.
                                          currentProgress:
                                            type: number
                                            description: >-
                                              The current progress of the customer in
                                              the achievement.
                                          target:
                                            type: number
                                            description: >-
                                              The target value to complete the
                                              achievement.
                                      - type: object
                                        title: extendLoyaltyPointsExpiryDate
                                        description: >
                                          If loyalty points have an expiry date,
                                          this effect extends the expiry of all
                                          active and pending point transactions by
                                          a selected duration.
                                        example:
                                          programId: 5
                                          subLedgerId: main
                                          extensionDuration: 12h
                                          affectedTransactions: []
                                        required:
                                          - programId
                                          - subLedgerId
                                          - extensionDuration
                                          - previousExpirationDate
                                        properties:
                                          programId:
                                            type: integer
                                            description: >-
                                              ID of the loyalty program that contains
                                              these points.
                                          subLedgerId:
                                            type: string
                                            description: >-
                                              API name of the loyalty program
                                              subledger that contains these points.
                                          extensionDuration:
                                            type: string
                                            description: >
                                              Time frame by which the expiry date
                                              extends.


                                              The time format is either:

                                              - immediate, or

                                              - an **integer** followed by a letter
                                              indicating the time unit.


                                              Examples: `immediate`, `30s`, `40m`,
                                              `1h`, `5D`, `7W`, `10M`, `15Y`.


                                              Available units:


                                              - `s`: seconds

                                              - `m`: minutes

                                              - `h`: hours

                                              - `D`: days

                                              - `W`: weeks

                                              - `M`: months

                                              - `Y`: years


                                              You can round certain units up or down:

                                              - `_D` for rounding down days only.
                                              Signifies the start of the day.

                                              - `_U` for rounding up days, weeks,
                                              months and years. Signifies the end of
                                              the day, week, month or year.
                                            example: 12h
                                          affectedTransactions:
                                            type: array
                                            description: >-
                                              List of transactions affected by the
                                              expiry date update.
                                            items:
                                              type: object
                                              description: >-
                                                The properties specific to effects for
                                                changing the expiry dates of loyalty
                                                ledger entries.
                                              required:
                                                - transactionUUID
                                                - newExpiryDate
                                              properties:
                                                transactionUUID:
                                                  type: string
                                                  format: uuid
                                                  description: >-
                                                    The identifier of the transaction
                                                    affected by the extension or update.
                                                previousExpiryDate:
                                                  type: string
                                                  format: date-time
                                                  description: >-
                                                    Expiry date of the transactions before
                                                    applying the extension or update.
                                                newExpiryDate:
                                                  type: string
                                                  format: date-time
                                                  description: >-
                                                    Expiry date of the transaction after
                                                    applying the extension or update.
                                      - type: object
                                        title: setLoyaltyPointsExpiryDate
