                                                ledger entries.
                                              required:
                                                - transactionUUID
                                                - newExpiryDate
                                              properties:
                                                transactionUUID:
                                                  type: string
                                                  format: uuid
                                                  description: >-
                                                    The identifier of the transaction
                                                    affected by the extension or update.
                                                previousExpiryDate:
                                                  type: string
                                                  format: date-time
                                                  description: >-
                                                    Expiry date of the transactions before
                                                    applying the extension or update.
                                                newExpiryDate:
                                                  type: string
                                                  format: date-time
                                                  description: >-
                                                    Expiry date of the transaction after
                                                    applying the extension or update.
