# path: /v1/loyalty_programs/{loyaltyProgramId}/export_customer_balance
get:
  operationId: exportLoyaltyBalance
  summary: Export customer loyalty balance to CSV
  deprecated: true
  description: >
    > [!note] Management API endpoints are **not** meant to be used in real-time
    integrations that directly serve your end users. Rate limit: 3 requests per
    second.


    To export customer loyalty balances to CSV, use the [Export customer loyalty

    balances to
    CSV](/management-api#tag/Loyalty/operation/exportLoyaltyBalances) endpoint.


    Download a CSV file containing the balance of each customer in the loyalty

    program.


    > [!tip] If the exported CSV file is too large to view, you can

    > [split it into multiple
    files](https://www.google.com/search?q=split+CSV+into+multiple+files).
  tags:
    - Loyalty
  parameters:
    - name: loyaltyProgramId
      in: path
      description: The identifier for the loyalty program.
      example: '45'
      required: true
      schema:
        type: string
    - name: endDate
      in: query
      required: false
      description: >
        Used to return expired, active, and pending loyalty balances before this

        timestamp. You can enter any past, present, or future timestamp value.


        > [!note] **Note**

        > - This must be an RFC3339 timestamp string.

        > - You can include a time component in your string, for example,
        `T23:59:59` to specify the end of the day. The time zone setting

        >   considered is `UTC`. If you do not include a time component, a
        default time value of `T00:00:00` (midnight) in `UTC` is considered.
      example: '2024-05-29T15:04:05+07:00'
      schema:
        type: string
        format: date-time
  responses:
    '200':
      description: OK
      content:
        application/csv:
          schema:
            type: string
            format: csv
    '400':
      description: Bad request
      content:
        application/csv:
          schema:
            type: object
            properties:
              message:
                type: string
              errors:
                type: array
                description: >-
                  An array of individual problems encountered during the
                  request.
                items:
                  type: object
                  required:
                    - source
                    - title
                  properties:
                    title:
                      type: string
                      description: Short description of the problem.
                    details:
                      type: string
                      description: >-
                        Longer description of this specific instance of the
                        problem.
                    source:
                      type: object
                      description: >
                        The source of the current error, exactly one of
                        `pointer`, `parameter` or `line` will be defined.
                      properties:
                        pointer:
                          type: string
                          description: >-
                            Pointer to the path in the payload that caused this
                            error.
                        parameter:
                          type: string
                          description: Query parameter that caused this error.
                        line:
                          type: string
                          description: >-
                            Line number in uploaded multipart file that caused
                            this error. 'N/A' if unknown.
                        resource:
                          type: string
                          description: Pointer to the resource that caused this error.
              StatusCode:
                type: integer
                description: The error code
    '401':
      description: Unauthorized
      content:
        application/csv:
          schema:
            type: object
            properties:
              message:
                type: string
              errors:
                type: array
                description: >-
                  An array of individual problems encountered during the
                  request.
                items:
                  type: object
                  required:
                    - source
                    - title
                  properties:
                    title:
                      type: string
                      description: Short description of the problem.
                    details:
                      type: string
                      description: >-
                        Longer description of this specific instance of the
                        problem.
                    source:
                      type: object
                      description: >
                        The source of the current error, exactly one of
                        `pointer`, `parameter` or `line` will be defined.
                      properties:
                        pointer:
                          type: string
                          description: >-
                            Pointer to the path in the payload that caused this
                            error.
                        parameter:
                          type: string
                          description: Query parameter that caused this error.
                        line:
                          type: string
                          description: >-
                            Line number in uploaded multipart file that caused
                            this error. 'N/A' if unknown.
                        resource:
                          type: string
                          description: Pointer to the resource that caused this error.
              StatusCode:
                type: integer
                description: The error code
